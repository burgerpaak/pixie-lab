<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아바타 메이커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #e2e2e2;
  --text: #111;
  --text2: #777;
  --hover: #f7f7f7;
  --selected: #f0f0f0;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Outfit', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ── Layout ── */
.app {
  display: flex;
  height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  width: clamp(170px, 13vw, 210px);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  user-select: none;
  flex-shrink: 0;
}

.sidebar-title {
  padding: 24px 20px 20px;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
}

.sidebar-menu {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 8px;
  gap: 2px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
  transition: background 0.15s;
}

.sidebar-item:hover { background: var(--hover); }
.sidebar-item.active { background: var(--selected); }
.sidebar-item .emoji { font-size: 16px; width: 22px; text-align: center; }

.sidebar-download {
  padding: 16px;
  margin-top: auto;
}

.sidebar-download button {
  width: 100%;
  padding: 10px 0;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  transition: background 0.15s;
}

.sidebar-download button:hover { background: var(--hover); }

/* ── Sub-sidebar ── */
.subsidebar {
  width: 0;
  overflow: hidden;
  background: var(--surface);
  border-right: none;
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  user-select: none;
  flex-shrink: 0;
}

.subsidebar.open {
  width: clamp(220px, 24vw, 360px);
  border-right: 1px solid var(--border);
}

.subsidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 18px 16px;
  min-height: 56px;
}

.subsidebar-title {
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
  white-space: nowrap;
}

.subsidebar-random {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}

.subsidebar-random:hover { background: var(--hover); }

.subsidebar-options {
  flex: 1;
  overflow-y: auto;
  padding: 0 18px 18px;
}

.options-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.option-box {
  aspect-ratio: 1/1;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: transparent;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  transition: background 0.15s;
  padding: 4px;
  overflow: hidden;
}

.option-box:hover { background: var(--hover); }
.option-box.active { background: var(--selected); border-color: #ccc; }

.option-box svg {
  width: 70%;
  height: 70%;
  image-rendering: pixelated;
}

.option-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* ── Color Palette ── */
.color-palette {
  display: flex;
  gap: 8px;
  padding: 16px 0 8px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s;
}

.color-swatch:hover { border-color: #aaa; }
.color-swatch.active { border-color: #333; }

.hue-slider-wrap {
  width: 100%;
  padding: 4px 0 8px;
}
.hue-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 14px;
  border-radius: 7px;
  background: linear-gradient(to right, hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%), hsl(180,100%,50%), hsl(240,100%,50%), hsl(300,100%,50%), hsl(360,100%,50%));
  outline: none;
  cursor: pointer;
}
.hue-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid #333;
  cursor: pointer;
}
.hue-slider::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid #333;
  cursor: pointer;
}

/* ── Preview ── */
.preview {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  min-width: 0;
}

.avatar-card {
  width: min(560px, calc(100vh - 20px));
  aspect-ratio: 1/1;
  border-radius: 50%;
  background: var(--surface);
  box-shadow: 0 4px 40px rgba(0,0,0,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.avatar-card svg {
  width: 75%;
  height: 75%;
  image-rendering: pixelated;
}

/* ── Overlay Buttons ── */
.overlay-buttons {
  position: absolute;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  align-items: center;
  z-index: 10;
}

.overlay-buttons.hidden { display: none; }

.btn-random-big {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  transition: background 0.15s;
}

.btn-random-big:hover { background: var(--hover); }

.btn-create {
  padding: 14px 24px;
  border-radius: 28px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.15s;
}

.btn-create:hover { background: var(--hover); }

/* ── Undo/Redo ── */
.undo-redo {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  border: 1px solid var(--border);
  border-radius: 28px;
  background: var(--surface);
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden;
  z-index: 20;
  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;
}

.undo-redo.hidden { display: none; }

.undo-redo button {
  width: 44px;
  height: 38px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, opacity 0.15s;
  -webkit-user-drag: none;
  user-select: none;
}

.undo-redo button:hover { background: var(--hover); }
.undo-redo button.disabled { opacity: 0.25; pointer-events: none; }
.undo-redo .divider { width: 1px; background: var(--border); }

/* ── Responsive ── */
@media (max-width: 820px) {
  .app { flex-direction: column; height: 100vh; }

  .sidebar {
    width: 100%;
    flex-direction: row;
    border-right: none;
    border-bottom: 1px solid var(--border);
    height: auto;
    padding: 0;
  }

  .sidebar-title {
    display: none;
  }

  .sidebar-menu {
    flex-direction: row;
    overflow-x: auto;
    justify-content: flex-start;
    padding: 8px;
    gap: 4px;
    flex: 1;
  }

  .sidebar-item {
    white-space: nowrap;
    padding: 8px 12px;
    font-size: 13px;
  }

  .sidebar-download {
    padding: 8px;
    margin-top: 0;
    display: flex;
    align-items: center;
  }

  .sidebar-download button {
    padding: 8px 14px;
    white-space: nowrap;
  }

  .subsidebar {
    width: 100% !important;
    max-height: 0;
    border-right: none;
    border-bottom: 1px solid var(--border);
    transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .subsidebar.open {
    max-height: 220px;
    width: 100% !important;
    overflow-y: auto;
  }

  .avatar-card {
    width: 260px;
  }

  .undo-redo {
    bottom: 12px;
    right: 12px;
  }
}

/* scrollbar */
.subsidebar-options::-webkit-scrollbar,
.sidebar-menu::-webkit-scrollbar {
  width: 4px;
  height: 4px;
}
.subsidebar-options::-webkit-scrollbar-thumb,
.sidebar-menu::-webkit-scrollbar-thumb {
  background: #ddd;
  border-radius: 2px;
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-title">아바타 메이커</div>
    <div class="sidebar-menu" id="sidebarMenu"></div>
    <div class="sidebar-download">
      <button id="downloadBtn">💾 다운로드</button>
    </div>
  </nav>

  <!-- Sub-sidebar -->
  <aside class="subsidebar" id="subsidebar">
    <div class="subsidebar-header">
      <span class="subsidebar-title" id="subsidebarTitle"></span>
      <button class="subsidebar-random" id="subRandomBtn" title="랜덤">🎲</button>
    </div>
    <div class="subsidebar-options" id="subsidebarOptions"></div>
  </aside>

  <!-- Preview -->
  <main class="preview">
    <div class="avatar-card" id="avatarCard">
      <svg id="avatarSvg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges"></svg>
    </div>
    <div class="overlay-buttons" id="overlayButtons">
      <button class="btn-random-big" id="bigRandomBtn" title="랜덤">🎲</button>
      <button class="btn-create" id="createBtn">✏️ 새로 만들기</button>
    </div>
  </main>
</div>

<!-- Undo/Redo -->
<div class="undo-redo hidden" id="undoRedo">
  <button id="undoBtn" title="되돌리기">↩</button>
  <div class="divider"></div>
  <button id="redoBtn" title="다시 실행">↪</button>
</div>

  // ── Flood Fill Cache ──
  const skinFillCache = {};

  function computeSkinFill(faceIdx) {
    if (skinFillCache[faceIdx]) return skinFillCache[faceIdx];

    const GRID = 24; // 240 / 10
    const grid = Array.from({ length: GRID }, () => new Uint8Array(GRID));

    // Mark face outline pixels as walls
    const faceRects = PARTS.face[faceIdx] || PARTS.face[0];
    for (const p of faceRects) {
      const gx = p[0] / 10;
      const gy = p[1] / 10;
      if (gx >= 0 && gx < GRID && gy >= 0 && gy < GRID) {
        grid[gy][gx] = 1; // wall
      }
    }

    // Flood fill from center (12, 12)
    const filled = [];
    const visited = Array.from({ length: GRID }, () => new Uint8Array(GRID));
    const queue = [[12, 12]];
    visited[12][12] = 1;

    while (queue.length > 0) {
      const [cx, cy] = queue.shift();
      if (grid[cy][cx] === 1) continue; // wall
      filled.push([cx * 10, cy * 10]);

      const neighbors = [[cx-1, cy], [cx+1, cy], [cx, cy-1], [cx, cy+1]];
      for (const [nx, ny] of neighbors) {
        if (nx >= 0 && nx < GRID && ny >= 0 && ny < GRID && !visited[ny][nx]) {
          visited[ny][nx] = 1;
          if (grid[ny][nx] !== 1) {
            queue.push([nx, ny]);
          }
        }
      }
    }

    skinFillCache[faceIdx] = filled;
    return filled;
  }

  // ── SVG Rect Helpers ──
  function rect(x, y, color) {
    return `<rect x="${x}" y="${y}" width="10" height="10" fill="${color}"/>`;
  }

  function renderRects(points, defaultColor, colorOverride) {
    let svg = '';
    for (const p of points) {
      const x = p[0];
      const y = p[1];
      const origColor = p[2] || defaultColor;

      let fillColor;
      if (colorOverride && origColor !== '#fff') {
        // Replace the base color with the override, but keep #fff as-is (e.g. glass lenses)
        fillColor = colorOverride;
      } else {
        fillColor = origColor;
      }

      svg += rect(x, y, fillColor);
    }
    return svg;
  }

  // ── Thumbnail bounding box cache (per category) ──
  const thumbBBoxCache = {};
  function getCategoryBBox(partKey) {
    if (thumbBBoxCache[partKey]) return thumbBBoxCache[partKey];
    const partsArr = PARTS[partKey] || [];
    let minX = 240, minY = 240, maxX = 0, maxY = 0;
    for (let i = 0; i < partsArr.length; i++) {
      let pts = partsArr[i];
      if (partKey === 'hair') {
        if (PARTS.hairOverlay[i]) pts = pts.concat(PARTS.hairOverlay[i]);
        if (PARTS.hairBack && PARTS.hairBack[i] && PARTS.hairBack[i].length > 0) pts = pts.concat(PARTS.hairBack[i]);
      }
      for (const p of pts) {
        minX = Math.min(minX, p[0]);
        minY = Math.min(minY, p[1]);
        maxX = Math.max(maxX, p[0] + 10);
        maxY = Math.max(maxY, p[1] + 10);
      }
    }
    const pad = 5;
    thumbBBoxCache[partKey] = { vx: minX - pad, vy: minY - pad, vw: maxX - minX + pad * 2, vh: maxY - minY + pad * 2 };
    return thumbBBoxCache[partKey];
  }

  // ── Render Thumbnail SVG for option boxes ──
  function renderThumbnailSvg(partKey, idx, color) {
    let points;
    if (partKey === 'face') {
      points = PARTS.face[idx];
    } else if (partKey === 'eyes') {
      points = PARTS.eyes[idx];
    } else if (partKey === 'mouth') {
      points = PARTS.mouth[idx];
    } else if (partKey === 'hair') {
      points = PARTS.hair[idx];
    } else if (partKey === 'accessory') {
      points = PARTS.accessory[idx];
    }
    if (!points) return '';

    // For hair, combine with hairOverlay and hairBack points
    let allPoints = points;
    if (partKey === 'hair') {
      if (PARTS.hairOverlay[idx]) allPoints = allPoints.concat(PARTS.hairOverlay[idx]);
      if (PARTS.hairBack && PARTS.hairBack[idx] && PARTS.hairBack[idx].length > 0) allPoints = allPoints.concat(PARTS.hairBack[idx]);
    }

    // Use shared bounding box for consistent pixel size within category
    const { vx, vy, vw, vh } = getCategoryBBox(partKey);

    let rects = '';
    for (const p of allPoints) {
      const origColor = p[2] || '#000';
      let fill = origColor;
      if (color && (origColor === '#666' || origColor === 'blue')) fill = color;
      rects += rect(p[0], p[1], fill);
    }

    return `<svg viewBox="${vx} ${vy} ${vw} ${vh}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${rects}</svg>`;
  }

  // ── Render Avatar ──
  function renderAvatar() {
    const svg = document.getElementById('avatarSvg');
    const faceIdx = state.face;
    const skinColors = getColorPalette('face');
    const skinColor = skinColors[state.skinColor];
    const eyesIdx = state.eyes;
    const mouthIdx = state.mouth;
    const hairIdx = state.hair;
    const hairColors = getColorPalette('hair');
    const hairColor = hairColors[state.hairColor];
    const accIdx = state.accessory;
    const accColors = getColorPalette('accessory');
    const accColor = accColors[state.accColor];

    let svgContent = '';

    // Pre-compute face data (needed by hairBack and later layers)
    const faceRects = PARTS.face[faceIdx] || PARTS.face[0];
    const skinPixels = computeSkinFill(faceIdx);

    // Layer 0: Hair back (dynamic — fill behind face where hair logically extends)
    if (hairIdx >= 0 && PARTS.hair[hairIdx]) {
      // Collect all hair pixel columns (front + overlay + static back)
      const allHairPoints = [...PARTS.hair[hairIdx]];
      if (PARTS.hairOverlay[hairIdx]) allHairPoints.push(...PARTS.hairOverlay[hairIdx]);
      if (PARTS.hairBack && PARTS.hairBack[hairIdx]) allHairPoints.push(...PARTS.hairBack[hairIdx]);

      // Build map: for each x column, find the min and max y of hair pixels
      const colRange = {};
      for (const p of allHairPoints) {
        const x = p[0];
        if (!colRange[x]) colRange[x] = { minY: p[1], maxY: p[1] };
        else {
          colRange[x].minY = Math.min(colRange[x].minY, p[1]);
          colRange[x].maxY = Math.max(colRange[x].maxY, p[1]);
        }
      }

      // For each x column, find the max y extent of face outline + skin
      const faceColMax = {};
      for (const p of faceRects) {
        const x = p[0];
        faceColMax[x] = Math.max(faceColMax[x] || 0, p[1]);
      }
      for (const [x, y] of skinPixels) {
        faceColMax[x] = Math.max(faceColMax[x] || 0, y);
      }

      // Fill continuously from hair minY to face maxY for each column
      const hairBackSet = new Set();
      for (const x in colRange) {
        const xNum = parseInt(x);
        const startY = colRange[x].minY;
        // End at whichever is greater: hair maxY or face maxY in this column
        const endY = Math.max(colRange[x].maxY, faceColMax[xNum] || 0);
        for (let y = startY; y <= endY; y += 10) {
          const key = xNum + ',' + y;
          if (!hairBackSet.has(key)) {
            hairBackSet.add(key);
            svgContent += rect(xNum, y, hairColor);
          }
        }
      }
    }

    // Layer 1: Skin fill (flood-filled interior)
    for (const [x, y] of skinPixels) {
      svgContent += rect(x, y, skinColor);
    }

    // Layer 2: Face outline (black)
    svgContent += renderRects(faceRects, '#000', null);

    // Layer 3: Eyes (black)
    if (PARTS.eyes[eyesIdx]) {
      svgContent += renderRects(PARTS.eyes[eyesIdx], '#000', null);
    }

    // Layer 4: Mouth (keep original colors)
    if (PARTS.mouth[mouthIdx]) {
      const mouthPoints = PARTS.mouth[mouthIdx];
      for (const p of mouthPoints) {
        const color = p[2] || '#000';
        svgContent += rect(p[0], p[1], color);
      }
    }

    // Layer 5: Hair + hairOverlay
    if (hairIdx >= 0 && PARTS.hair[hairIdx]) {
      // Hair rects: replace #666 with selected hair color
      const hairPoints = PARTS.hair[hairIdx];
      for (const p of hairPoints) {
        const origColor = p[2] || '#000';
        const fill = origColor === '#666' ? hairColor : origColor;
        svgContent += rect(p[0], p[1], fill);
      }

      // Hair overlay (covers face outline with hair color)
      if (PARTS.hairOverlay[hairIdx]) {
        const overlayPoints = PARTS.hairOverlay[hairIdx];
        for (const p of overlayPoints) {
          const origColor = p[2] || '#000';
          const fill = origColor === '#666' ? hairColor : origColor;
          svgContent += rect(p[0], p[1], fill);
        }
      }
    }

    // Layer 6: Accessories
    if (accIdx >= 0 && PARTS.accessory[accIdx]) {
      const accPoints = PARTS.accessory[accIdx];
      for (const p of accPoints) {
        const origColor = p[2] || '#000';
        let fill;
        if (origColor === 'blue') {
          fill = accColor;
        } else if (origColor === '#fff') {
          fill = '#fff'; // glass lenses stay white
        } else {
          fill = origColor;
        }
        svgContent += rect(p[0], p[1], fill);
      }
    }

    svg.innerHTML = svgContent;
  }

  function renderSidebar() {

      el.addEventListener('click', () => {
        activeCategory = el.dataset.cat;
        hideOverlay();
        renderSidebar();
        openSubsidebar(el.dataset.cat);
      });
    });

    sub.classList.add('open');

  function getStateKey(catId) {
    // Map category id to state key
    if (catId === 'hair') return 'hair';
    if (catId === 'accessory') return 'accessory';
    return catId;
  }

  function getColorKey(catId) {
    if (catId === 'face') return 'skinColor';
    if (catId === 'hair') return 'hairColor';
    if (catId === 'accessory') return 'accColor';
    return null;
  }

  function getHueKey(catId) {
    if (catId === 'face') return 'skinHue';
    if (catId === 'hair') return 'hairHue';
    if (catId === 'accessory') return 'accHue';
    return null;

  function getColorPalette(catId) {
    let base;
    if (catId === 'face') base = SKIN_COLORS;

    else if (catId === 'accessory') base = ACC_COLORS;

    // Replace last entry (blue) with dynamic hsl

    const hue = state[hueKey];
    const colors = base.slice();
    colors[colors.length - 1] = `hsl(${hue}, 100%, 50%)`;
    return colors;
  }

  function renderOptions(cat) {
    const container = document.getElementById('subsidebarOptions');
    let html = '';

    // Option boxes grid
    const hasNone = (cat.id === 'hair' || cat.id === 'accessory');
    const partsKey = cat.id === 'accessory' ? 'accessory' : cat.id;
    const partsArr = PARTS[partsKey] || [];
    const stateKey = getStateKey(cat.id);
    const currentVal = state[stateKey];

    // Color palette above options if applicable
    if (cat.hasColorPalette) {
      html += renderColorPaletteHtml(cat.id);
    }

    html += '<div class="options-grid">';

    // "없음" option for hair and accessories
    if (hasNone) {
      html += `<button class="option-box${currentVal === -1 ? ' active' : ''}" data-cat="${cat.id}" data-idx="-1">
        <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges"><rect x="35" y="35" width="10" height="10"/><rect x="45" y="45" width="10" height="10"/><rect x="55" y="55" width="10" height="10"/><rect x="65" y="65" width="10" height="10"/><rect x="75" y="75" width="10" height="10"/><rect x="85" y="85" width="10" height="10"/><rect x="95" y="95" width="10" height="10"/><rect x="105" y="105" width="10" height="10"/><rect x="115" y="115" width="10" height="10"/><rect x="115" y="35" width="10" height="10"/><rect x="105" y="45" width="10" height="10"/><rect x="95" y="55" width="10" height="10"/><rect x="85" y="65" width="10" height="10"/><rect x="65" y="85" width="10" height="10"/><rect x="55" y="95" width="10" height="10"/><rect x="45" y="105" width="10" height="10"/><rect x="35" y="115" width="10" height="10"/></svg>
      </button>`;
    }

    // Render each variant option
    for (let i = 0; i < partsArr.length; i++) {
      const isActive = currentVal === i;
      const colors = getColorPalette(cat.id);
      const colorKey = getColorKey(cat.id);
      const thumbColor = cat.id === 'hair' ? (colors ? colors[state.hairColor] : HAIR_COLORS[state.hairColor]) : (cat.id === 'accessory' ? (colors ? colors[state.accColor] : ACC_COLORS[state.accColor]) : null);
      const thumbSvg = renderThumbnailSvg(partsKey, i, thumbColor);
      html += `<button class="option-box${isActive ? ' active' : ''}" data-cat="${cat.id}" data-idx="${i}">
        ${thumbSvg}
      </button>`;
    }

    html += '</div>';

    container.innerHTML = html;

    // Bind option click events
    container.querySelectorAll('.option-box').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        state[stateKey] = idx;
        renderOptions(cat);
        renderAvatar();
      });
    });

    // Bind color palette events
    if (cat.hasColorPalette) {
      bindColorPaletteEvents(container, cat);
    }
  }

  function renderColorPaletteHtml(catId) {
    const colors = getColorPalette(catId);
    const colorKey = getColorKey(catId);
    const hueKey = getHueKey(catId);
    const currentColorIdx = state[colorKey];
    const lastIdx = colors.length - 1;

    let html = '<div class="color-palette">';
    colors.forEach((color, i) => {
      const bg = i === lastIdx
        ? 'background: conic-gradient(hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%), hsl(180,100%,50%), hsl(240,100%,50%), hsl(300,100%,50%), hsl(360,100%,50%))'
        : `background: ${color}`;
      html += `<div class="color-swatch${currentColorIdx === i ? ' active' : ''}" style="${bg}" data-color-idx="${i}" data-cat="${catId}"></div>`;
    });
    html += '</div>';

    // Show HUE slider when last (custom color) swatch is selected
    if (currentColorIdx === lastIdx) {
      html += `<div class="hue-slider-wrap"><input type="range" class="hue-slider" min="0" max="360" step="1" value="${state[hueKey]}" data-cat="${catId}"></div>`;
    }

    return html;
  }

  function bindColorPaletteEvents(container, cat) {
    const colorKey = getColorKey(cat.id);
    container.querySelectorAll('.color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        state[colorKey] = parseInt(swatch.dataset.colorIdx);
        renderOptions(cat);
        renderAvatar();
      });
    });

    // HUE slider
    const slider = container.querySelector('.hue-slider');
    if (slider) {
      slider.addEventListener('input', () => {
        const hueKey = getHueKey(cat.id);
        state[hueKey] = parseInt(slider.value);
        const hslColor = `hsl(${state[hueKey]}, 100%, 50%)`;
        // Update last swatch color live
        const swatches = container.querySelectorAll('.color-swatch');
        const lastSwatch = swatches[swatches.length - 1];
        if (lastSwatch) lastSwatch.style.background = hslColor;
        // Update thumbnail fills live
        container.querySelectorAll('.option-box svg rect').forEach(r => {
          const fill = r.getAttribute('fill');
          if (fill && fill.startsWith('hsl(')) {
            r.setAttribute('fill', hslColor);
          }
        });
        renderAvatar();
      });
    }
  }

  // ── Overlay ──
  function hideOverlay() {
    overlayVisible = false;
    document.getElementById('overlayButtons').classList.add('hidden');
  }

  // ── Random ──
  function resolveColor(palette, idx, hue) {
    if (idx === palette.length - 1) return 'hsl(' + hue;
    return palette[idx];
  }

  function pickDistinctColor(palette, hueKey, usedColors) {
    // Try up to 20 times to find a non-overlapping color
    for (let attempt = 0; attempt < 20; attempt++) {
      // 50% chance of picking hue (last index) vs grayscale
      const useHue = Math.random() < 0.5;
      const idx = useHue ? palette.length - 1 : Math.floor(Math.random() * (palette.length - 1));
      let hue = state[hueKey];
      if (idx === palette.length - 1) hue = Math.floor(Math.random() * 360);
      const resolved = resolveColor(palette, idx, hue);
      // For hue colors, check distance from other hue colors
      let conflict = false;
      for (const used of usedColors) {
        if (resolved === used) { conflict = true; break; }
        // Both are hue colors — check if hues are too close
        if (resolved.startsWith('hsl(') && used.startsWith('hsl(')) {
          const h1 = parseInt(resolved.split('(')[1]);
          const h2 = parseInt(used.split('(')[1]);
          const diff = Math.min(Math.abs(h1 - h2), 360 - Math.abs(h1 - h2));
          if (diff < 30) { conflict = true; break; }
        }
      }
      if (!conflict) {
        if (idx === palette.length - 1) state[hueKey] = hue;
        return idx;
      }
    }
    // Fallback: just pick random
    const idx = Math.floor(Math.random() * palette.length);
    if (idx === palette.length - 1) state[hueKey] = Math.floor(Math.random() * 360);
    return idx;
  }

  function randomizeAll() {
    state.face = Math.floor(Math.random() * PARTS.face.length);
    state.eyes = Math.floor(Math.random() * PARTS.eyes.length);
    state.mouth = Math.floor(Math.random() * PARTS.mouth.length);

    // Hair: -1 (none) or 0..n
    if (PARTS.hair.length > 0) {
      state.hair = Math.floor(Math.random() * (PARTS.hair.length + 1)) - 1;
    } else {
      state.hair = -1;
    }

    // Accessory: -1 (none) or 0..n
    if (PARTS.accessory.length > 0) {
      state.accessory = Math.floor(Math.random() * (PARTS.accessory.length + 1)) - 1;
    } else {
      state.accessory = -1;
    }

    // Pick distinct colors for skin, hair, accessory
    const usedColors = [];

    // Skin color first
    state.skinColor = pickDistinctColor(SKIN_COLORS, 'skinHue', usedColors);
    usedColors.push(resolveColor(SKIN_COLORS, state.skinColor, state.skinHue));

    // Hair color (only matters if hair is visible)
    if (state.hair >= 0) {
      state.hairColor = pickDistinctColor(HAIR_COLORS, 'hairHue', usedColors);
      usedColors.push(resolveColor(HAIR_COLORS, state.hairColor, state.hairHue));
    }

    // Accessory color (only matters if accessory is visible)
    if (state.accessory >= 0) {
      state.accColor = pickDistinctColor(ACC_COLORS, 'accHue', usedColors);
    }

    renderAvatar();
  }

  function randomizeCategory(catId) {
    pushHistory();

    if (catId === 'face') {
      state.face = Math.floor(Math.random() * PARTS.face.length);
      state.skinColor = Math.floor(Math.random() * SKIN_COLORS.length);
      if (state.skinColor === SKIN_COLORS.length - 1) state.skinHue = Math.floor(Math.random() * 360);
    } else if (catId === 'eyes') {
      state.eyes = Math.floor(Math.random() * PARTS.eyes.length);
    } else if (catId === 'mouth') {
      state.mouth = Math.floor(Math.random() * PARTS.mouth.length);
    } else if (catId === 'hair') {
      if (PARTS.hair.length > 0) {
        state.hair = Math.floor(Math.random() * (PARTS.hair.length + 1)) - 1;
      }
      state.hairColor = Math.floor(Math.random() * HAIR_COLORS.length);
      if (state.hairColor === HAIR_COLORS.length - 1) state.hairHue = Math.floor(Math.random() * 360);
    } else if (catId === 'accessory') {
      if (PARTS.accessory.length > 0) {
        state.accessory = Math.floor(Math.random() * (PARTS.accessory.length + 1)) - 1;
      }
      state.accColor = Math.floor(Math.random() * ACC_COLORS.length);
      if (state.accColor === ACC_COLORS.length - 1) state.accHue = Math.floor(Math.random() * 360);
    }

    const cat = CATEGORIES.find(c => c.id === catId);
    if (cat) renderOptions(cat);
    renderAvatar();
    updateUndoRedo();
  }

  // ── History (Undo/Redo) ──
  function pushHistory() {
    history = history.slice(0, historyIndex + 1);
    history.push(JSON.parse(JSON.stringify(state)));
    historyIndex = history.length - 1;
  }

  function undo() {
    if (historyIndex <= 0) return;
    historyIndex--;
    state = JSON.parse(JSON.stringify(history[historyIndex]));
    renderAvatar();
    if (activeCategory) {
      const cat = CATEGORIES.find(c => c.id === activeCategory);
      if (cat) renderOptions(cat);
    }
    updateUndoRedo();
  }

  function redo() {
    if (historyIndex >= history.length - 1) return;
    historyIndex++;
    state = JSON.parse(JSON.stringify(history[historyIndex]));
    renderAvatar();
    if (activeCategory) {
      const cat = CATEGORIES.find(c => c.id === activeCategory);
      if (cat) renderOptions(cat);
    }
    updateUndoRedo();
  }

  function updateUndoRedo() {
    const box = document.getElementById('undoRedo');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');

    if (history.length <= 1) {
      box.classList.add('hidden');
      return;
    }
    box.classList.remove('hidden');
    undoBtn.className = historyIndex <= 0 ? 'disabled' : '';
    redoBtn.className = historyIndex >= history.length - 1 ? 'disabled' : '';
  }

  // ── Download ──
  function downloadAvatar() {
    const svgEl = document.getElementById('avatarSvg');
    const clone = svgEl.cloneNode(true);
    clone.setAttribute('width', '240');
    clone.setAttribute('height', '240');
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

    const svgData = new XMLSerializer().serializeToString(clone);
    const canvas = document.createElement('canvas');
    canvas.width = 560;
    canvas.height = 560;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#f5f5f5';
    ctx.fillRect(0, 0, 560, 560);

    const img = new Image();
    const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);

    img.onload = () => {
      ctx.imageSmoothingEnabled = false;
      const size = 520;
      const x = (560 - size) / 2;
      const y = (560 - size) / 2;
      ctx.drawImage(img, x, y, size, size);
      URL.revokeObjectURL(url);

      const link = document.createElement('a');
      link.download = 'avatar.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    };
    img.src = url;
  }

  // ── Init ──
  function init() {
    renderAvatar();
    renderSidebar();
    updateUndoRedo();

    // Initial history entry
    pushHistory();

    // Big random button (overlay)
    document.getElementById('bigRandomBtn').addEventListener('click', () => {
      randomizeAll();
    });

    // Create button (overlay)
    document.getElementById('createBtn').addEventListener('click', () => {
      state = {
        face: 0,
        skinColor: 0,
        eyes: 0,
        mouth: 0,
        hair: -1,
        hairColor: 0,
        accessory: -1,
        accColor: 0,
        skinHue: 240,
        hairHue: 240,
        accHue: 240,
      };
      hideOverlay();
      activeCategory = 'face';
      renderSidebar();
      openSubsidebar('face');
      renderAvatar();
    });

    // Sub-sidebar random
    document.getElementById('subRandomBtn').addEventListener('click', () => {
      if (activeCategory) randomizeCategory(activeCategory);
    });

    // Download
    document.getElementById('downloadBtn').addEventListener('click', downloadAvatar);

    // Undo/Redo
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);

    // Prevent drag on undo/redo buttons
    document.getElementById('undoRedo').addEventListener('dragstart', e => e.preventDefault());
  }

  init();
})();
</script>
