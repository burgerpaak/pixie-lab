<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-user-drag: none; }

:root {
  --bg: #1a1a1a;
  --surface: #242424;
  --border: #333;
  --text: #e8e8e8;
  --text2: #888;
  --hover: #2e2e2e;
  --selected: #353535;
}


html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Outfit', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 20px 20px;
  color: var(--text);
}

/* ── Layout ── */
.app {
  display: flex;
  height: 100vh;
}

.mobile-logo { display: none; }

/* ── Sidebar ── */
.sidebar {
  width: clamp(170px, 13vw, 210px);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  user-select: none;
  flex-shrink: 0;
}

.sidebar-title {
  padding: 24px 20px 20px;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
}

.sidebar-menu {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 8px;
  gap: 6px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
  transition: background 0.15s;
}

.sidebar-item:hover { background: var(--hover); }
.sidebar-item.active { background: var(--selected); }
.sidebar-item .cat-icon { width: 20px; height: 20px; flex-shrink: 0; fill: var(--text); }

.sidebar-download {
  padding: 16px;
  margin-top: auto;
}

.sidebar-download button {
  width: 100%;
  padding: 10px 0;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  font-weight: 400;
  color: var(--text);
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.sidebar-download button .cat-icon { width: 16px; height: 16px; fill: var(--text); }

.sidebar-download button:hover { background: var(--hover); }

/* ── Sub-sidebar ── */
.subsidebar {
  width: 0;
  overflow: hidden;
  background: var(--surface);
  border-right: none;
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  user-select: none;
  flex-shrink: 0;
}

.subsidebar > * {
  min-width: clamp(220px, 24vw, 360px);
  opacity: 0;
  transition: opacity 0.15s ease 0.15s;
}

.subsidebar.open {
  width: clamp(220px, 24vw, 360px);
  border-right: 1px solid var(--border);
}

.subsidebar.open > * {
  opacity: 1;
}

.subsidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 18px 16px;
  min-height: 56px;
}

.subsidebar-title {
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
  white-space: nowrap;
}

.subsidebar-random {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}

.subsidebar-random:hover { background: var(--hover); }

.subsidebar-options {
  flex: 1;
  overflow-y: auto;
  padding: 0 18px 18px;
}

.options-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.option-box {
  aspect-ratio: 1/1;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #3a3a3a;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  transition: background 0.15s;
  padding: 4px;
  overflow: hidden;
}

.option-box:hover { background: var(--hover); }
.option-box.active { background: var(--selected); border-color: #666; }

.option-box svg {
  width: 70%;
  height: 70%;
  image-rendering: pixelated;
}

.option-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* ── Color Palette ── */
.color-palette {
  display: flex;
  gap: 8px;
  padding: 16px 0 16px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s;
}

.color-swatch:hover { border-color: #888; }
.color-swatch.active { border-color: #e8e8e8; }

.hue-slider-wrap {
  width: 100%;
  padding: 4px 0 8px;
}
.hue-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 14px;
  border-radius: 7px;
  background: linear-gradient(to right, hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%), hsl(180,100%,50%), hsl(240,100%,50%), hsl(300,100%,50%), hsl(360,100%,50%));
  outline: none;
  cursor: pointer;
}
.hue-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #e8e8e8;
  border: 2px solid #555;
  cursor: pointer;
}
.hue-slider::-moz-range-thumb {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #e8e8e8;
  border: 2px solid #555;
  cursor: pointer;
}

/* ── Preview ── */
.preview {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  min-width: 0;
}

.avatar-card {
  width: min(520px, calc(100vh - 100px));
  aspect-ratio: 1/1;
  border-radius: 50%;
  background: #ffffff;
  box-shadow: 0 4px 40px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.avatar-card svg {
  width: 75%;
  height: 75%;
  image-rendering: pixelated;
}

/* ── Overlay Buttons ── */
.overlay-buttons {
  position: absolute;
  left: 50%;
  bottom: -10px;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  align-items: center;
  z-index: 10;
}

.overlay-buttons.hidden { display: none; }

.btn-random-big {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 1px solid #ddd;
  background: #fff;
  cursor: pointer;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  transition: background 0.15s;
}

.btn-random-big:hover { background: #f0f0f0; }

.btn-create {
  padding: 14px 32px;
  border-radius: 28px;
  border: 1px solid #ddd;
  background: #fff;
  cursor: pointer;
  font-family: inherit;
  font-size: 18px;
  font-weight: 500;
  color: #111;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background 0.15s;
}

.btn-create:hover { background: #f0f0f0; }

/* ── Save Modal ── */
.save-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.save-modal-overlay.hidden { display: none; }
.save-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  min-width: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.save-modal-header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
}
.save-modal-close {
  background: none;
  border: none;
  color: var(--text2);
  font-size: 22px;
  padding: 4px 8px;
  cursor: pointer;
}
.save-modal-close:hover { color: var(--text); }
.save-modal-preview {
  border-radius: 12px;
  overflow: hidden;
}
.save-modal-preview canvas {
  display: block;
  image-rendering: pixelated;
}
.save-modal-options {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
}
.texture-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text2);
}
.texture-checkbox { display: none; }
.toggle-switch {
  width: 36px;
  height: 20px;
  background: var(--border);
  border-radius: 10px;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  background: var(--text2);
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: transform 0.2s, background 0.2s;
}
.texture-checkbox:checked + .toggle-switch {
  background: var(--text);
}
.texture-checkbox:checked + .toggle-switch::after {
  transform: translateX(16px);
  background: var(--bg);
}
.save-modal-download {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: var(--text);
  color: var(--bg);
  font-family: 'Pixelify Sans', monospace;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}
.save-modal-download:hover { opacity: 0.9; }

/* ── Watermark ── */
.watermark {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Pixelify Sans', monospace;
  font-size: 12px;
  color: rgba(232,232,232,0.25);
  white-space: nowrap;
  z-index: 100;
  user-select: none;
}
.watermark-link {
  color: rgba(232,232,232,0.5);
  text-decoration: none;
  font-weight: 300;
  padding: 8px 4px;
  margin: -8px -4px;
}

/* ── Undo/Redo ── */
.undo-redo {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  border: 1px solid var(--border);
  border-radius: 28px;
  background: var(--surface);
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden;
  z-index: 20;
  user-select: none;
  -webkit-user-select: none;
  -webkit-user-drag: none;
}

.undo-redo.hidden { display: none; }

.undo-redo button {
  width: 50px;
  height: 44px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, opacity 0.15s;
  -webkit-user-drag: none;
  user-select: none;
}

.undo-redo button:hover { background: var(--hover); }
.undo-redo button.disabled { opacity: 0.25; pointer-events: none; }
.undo-redo .divider { width: 1px; background: var(--border); }

/* ── Responsive ── */
@media (max-width: 820px) {
  .app { flex-direction: column; height: 100vh; }

  .sidebar {
    width: 100%;
    flex-direction: row;
    border-right: none;
    border-bottom: 1px solid var(--border);
    height: auto;
    padding: 0;
  }

  .sidebar-title {
    display: none;
  }

  .mobile-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 0 6px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-menu {
    flex-direction: row;
    overflow-x: auto;
    justify-content: flex-start;
    padding: 8px;
    gap: 4px;
    flex: 1;
  }

  .sidebar-item {
    white-space: nowrap;
    padding: 8px 12px;
    font-size: 13px;
  }

  .sidebar-download {
    padding: 8px;
    margin-top: 0;
    display: flex;
    align-items: center;
  }

  .sidebar-download button {
    padding: 8px 14px;
    white-space: nowrap;
  }

  .subsidebar {
    width: 100% !important;
    max-height: 0;
    border-right: none;
    border-bottom: 1px solid var(--border);
    transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .subsidebar.open {
    max-height: 220px;
    width: 100% !important;
    overflow-y: auto;
    margin-bottom: 0;
  }

  .preview {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding-bottom: 100px;
  }

  .subsidebar.open ~ .preview {
    align-items: flex-start;
    padding-top: 40px;
    padding-bottom: 0;
  }

  .avatar-card {
    width: 260px;
  }

  .undo-redo {
    bottom: 12px;
    right: 12px;
  }

  .watermark {
    position: fixed;
    bottom: 8px;
    left: 50%;
  }
}

/* ── Accessory Sub-category Tabs ── */
.acc-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.acc-tab {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.acc-tab:hover { background: var(--hover); }
.acc-tab.active {
  background: #e8e8e8;
  color: #1a1a1a;
  border-color: #e8e8e8;
}

/* scrollbar */
.subsidebar-options::-webkit-scrollbar,
.sidebar-menu::-webkit-scrollbar {
  width: 4px;
  height: 4px;
}
.subsidebar-options::-webkit-scrollbar-thumb,
.sidebar-menu::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 2px;
}

    '#a8e6cf', '#88d8b0', '#87ceeb', '#6495ed',
    '#dda0dd', '#ba55d3', '#ff69b4', '#00ced1',
  ];

  // ── Accessory Sub-categories ──
  const ACC_GROUPS = [
    { label: 'Hat', indices: [0,1,2,3,4,5,13,17,21] },
    { label: 'Glasses', indices: [6,7,8,9] },
    { label: 'Earring', indices: [10,11,12] },
    { label: 'Mood', indices: [14,15,16,18,19,20,22] },
  ];

  // ── Beard accessory index → beard style index mapping ──
  // Beard accessories have per-face variants stored in PARTS.beard
  const BEARD_ACC_MAP = { 18: 0, 19: 1, 20: 2 };

  let accGroupIdx = 0; // current accessory sub-category tab
  let bgTabIdx = 0; // 0=solid, 1=gradient

  // ── Option counts ──
  const OPTION_COUNTS = {
    face: PARTS.face.length,
    eyes: PARTS.eyes.length,
    mouth: PARTS.mouth.length,
    hair: PARTS.hair.length,        // actual styles (none is separate)
    accessory: PARTS.accessory.length, // actual styles (none is separate)
  };

  // ── State ──
  let state = {
    face: 0,
    skinColor: 0,
    eyes: 0,
    mouth: 0,
    hair: -1,
    hairColor: 2,
    accessory: [-1,-1,-1,-1],
    accColor0: 2, accColor1: 2, accColor2: 2, accColor3: 2,
    skinHue: 240,
    hairHue: 240,
    accHue0: 240, accHue1: 240, accHue2: 240, accHue3: 240,
    bgType: 'solid', bgColor: 0, bgGradient: 0, bgHue: 240, bgTexture: false,
  };

  let activeCategory = null;
  let overlayVisible = true;
  let history = [];
  let historyIndex = -1;

  // ── Flood Fill Cache ──
  const skinFillCache = {};

  function computeSkinFill(faceIdx) {
    if (skinFillCache[faceIdx]) return skinFillCache[faceIdx];

    const GRID = 24; // 240 / 10
    const grid = Array.from({ length: GRID }, () => new Uint8Array(GRID));

    // Mark face outline pixels as walls
    const faceRects = PARTS.face[faceIdx] || PARTS.face[0];
    for (const p of faceRects) {
      const gx = p[0] / 10;
      const gy = p[1] / 10;
      if (gx >= 0 && gx < GRID && gy >= 0 && gy < GRID) {
        grid[gy][gx] = 1; // wall
      }
    }

    // Flood fill from center (12, 12)
    const filled = [];
    const visited = Array.from({ length: GRID }, () => new Uint8Array(GRID));
    const queue = [[12, 12]];
    visited[12][12] = 1;

    while (queue.length > 0) {
      const [cx, cy] = queue.shift();
      if (grid[cy][cx] === 1) continue; // wall
      filled.push([cx * 10, cy * 10]);

      const neighbors = [[cx-1, cy], [cx+1, cy], [cx, cy-1], [cx, cy+1]];
      for (const [nx, ny] of neighbors) {
        if (nx >= 0 && nx < GRID && ny >= 0 && ny < GRID && !visited[ny][nx]) {
          visited[ny][nx] = 1;
          if (grid[ny][nx] !== 1) {
            queue.push([nx, ny]);
          }
        }
      }
    }

    skinFillCache[faceIdx] = filled;
    return filled;
  }

  // ── SVG Rect Helpers ──
  function rect(x, y, color) {
    return `<rect x="${x}" y="${y}" width="10" height="10" fill="${color}"/>`;
  }

  // Brighten dark colors for thumbnail visibility on dark UI (#3a3a3a bg)
  function thumbBrighten(color) {
    const c = color.toLowerCase();
    // Map known dark colors to lighter versions for thumbnails
    const darkMap = {
      '#000': '#888', '#000000': '#888',
      '#333': '#777', '#333333': '#777',
      '#4d4d4d': '#888',
    };
    if (darkMap[c]) return darkMap[c];
    // Parse hex colors and check brightness
    if (c.startsWith('#') && (c.length === 4 || c.length === 7)) {
      let r, g, b;
      if (c.length === 4) {
        r = parseInt(c[1]+c[1], 16); g = parseInt(c[2]+c[2], 16); b = parseInt(c[3]+c[3], 16);
      } else {
        r = parseInt(c.slice(1,3), 16); g = parseInt(c.slice(3,5), 16); b = parseInt(c.slice(5,7), 16);
      }
      const lum = (r * 0.299 + g * 0.587 + b * 0.114);
      if (lum < 80) {
        const boost = 1.8;
        r = Math.min(255, Math.round(r * boost + 60));
        g = Math.min(255, Math.round(g * boost + 60));
        b = Math.min(255, Math.round(b * boost + 60));
        return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
      }
    }
    return color;
  }

  function renderRects(points, defaultColor, colorOverride) {
    let svg = '';
    for (const p of points) {
      const x = p[0];
      const y = p[1];
      const origColor = p[2] || defaultColor;

      let fillColor;
      if (colorOverride && origColor !== '#fff') {
        // Replace the base color with the override, but keep #fff as-is (e.g. glass lenses)
        fillColor = colorOverride;
      } else {
        fillColor = origColor;
      }

      svg += rect(x, y, fillColor);
    }
    return svg;
  }

  // ── Thumbnail bounding box cache (per category) ──
  const thumbBBoxCache = {};
  function getCategoryBBox(partKey) {
    if (thumbBBoxCache[partKey]) return thumbBBoxCache[partKey];
    const partsArr = PARTS[partKey] || [];
    let minX = 240, minY = 240, maxX = 0, maxY = 0;
    for (let i = 0; i < partsArr.length; i++) {
      let pts = partsArr[i];
      if (partKey === 'hair') {
        if (PARTS.hairOverlay[i]) pts = pts.concat(PARTS.hairOverlay[i]);
        if (PARTS.hairBack && PARTS.hairBack[i] && PARTS.hairBack[i].length > 0) pts = pts.concat(PARTS.hairBack[i]);
      }
      for (const p of pts) {
        minX = Math.min(minX, p[0]);
        minY = Math.min(minY, p[1]);
        maxX = Math.max(maxX, p[0] + 10);
        maxY = Math.max(maxY, p[1] + 10);
      }
    }
    const pad = 5;
    thumbBBoxCache[partKey] = { vx: minX - pad, vy: minY - pad, vw: maxX - minX + pad * 2, vh: maxY - minY + pad * 2 };
    return thumbBBoxCache[partKey];
  }

  // ── Render Thumbnail SVG for option boxes ──
  function renderThumbnailSvg(partKey, idx, color) {
    let points;
    if (partKey === 'face') {
      points = PARTS.face[idx];
    } else if (partKey === 'eyes') {
      points = PARTS.eyes[idx];
    } else if (partKey === 'mouth') {
      points = PARTS.mouth[idx];
    } else if (partKey === 'hair') {
      points = PARTS.hair[idx];
    } else if (partKey === 'accessory') {
      points = PARTS.accessory[idx];
    }
    if (!points) return '';

    // For hair, combine with hairOverlay and hairBack points
    let allPoints = points;
    if (partKey === 'hair') {
      if (PARTS.hairOverlay[idx]) allPoints = allPoints.concat(PARTS.hairOverlay[idx]);
      if (PARTS.hairBack && PARTS.hairBack[idx] && PARTS.hairBack[idx].length > 0) allPoints = allPoints.concat(PARTS.hairBack[idx]);
    }

    // Use shared bounding box for consistent pixel size within category
    const { vx, vy, vw, vh } = getCategoryBBox(partKey);

    let rects = '';

    // For face, add skin fill behind outline
    if (partKey === 'face' && color) {
      const skinFill = computeSkinFill(idx);
      for (const p of skinFill) {
        rects += rect(p[0], p[1], color);
      }
    }

    for (const p of allPoints) {
      const origColor = p[2] || '#000';
      let fill = origColor;
      if (color && (origColor === '#666' || origColor === 'blue')) fill = color;
      // Brighten dark fills only for hair/accessory thumbnails (face/eyes/mouth keep original black)
      if (partKey !== 'face' && partKey !== 'eyes' && partKey !== 'mouth') fill = thumbBrighten(fill);
      rects += rect(p[0], p[1], fill);
    }

    return `<svg viewBox="${vx} ${vy} ${vw} ${vh}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${rects}</svg>`;
  }

  // ── Render Avatar ──
  function renderAvatar() {
    const svg = document.getElementById('avatarSvg');
    const faceIdx = state.face;
    const skinColors = getColorPalette('face');
    const skinColor = skinColors[state.skinColor];
    const eyesIdx = state.eyes;
    const mouthIdx = state.mouth;
    const hairIdx = state.hair;
    const hairColors = getColorPalette('hair');
    const hairColor = hairColors[state.hairColor];
    // Accessory colors resolved per group (used in Layer 6)

    let svgContent = '';

    // Pre-compute face data (needed by hairBack and later layers)
    const faceRects = PARTS.face[faceIdx] || PARTS.face[0];
    const skinPixels = computeSkinFill(faceIdx);

    // Layer 0: Hair back (static data only)
    if (hairIdx >= 0 && PARTS.hairBack && PARTS.hairBack[hairIdx]) {
      svgContent += renderRects(PARTS.hairBack[hairIdx], hairColor, hairColor);
    }

    // Layer 1: Skin fill (flood-filled interior)
    for (const [x, y] of skinPixels) {
      svgContent += rect(x, y, skinColor);
    }

    // Layer 1.5: Mood accessories (rendered later at Layer 4.5)
    const skinAccGi = ACC_GROUPS.findIndex(g => g.label === 'Mood');
    if (false && skinAccGi >= 0) {
      const accIdx = state.accessory[skinAccGi];
      if (accIdx >= 0) {
        const accPalette = getColorPalette('accessory', skinAccGi);
        const accColor = accPalette[state['accColor' + skinAccGi]];
        // Use per-face beard data if this is a beard accessory
        const beardStyleIdx = BEARD_ACC_MAP[accIdx];
        const accPoints = (beardStyleIdx !== undefined && PARTS.beard[beardStyleIdx])
          ? PARTS.beard[beardStyleIdx][state.face] || PARTS.beard[beardStyleIdx][0]
          : PARTS.accessory[accIdx];
        if (!accPoints) { /* skip */ }
        else for (const p of accPoints) {
          const origColor = p[2] || '#000';
          let fill;
          if (origColor === 'blue') { fill = accColor; }
          else if (origColor === '#fff') { fill = '#fff'; }
          else { fill = origColor; }
          svgContent += rect(p[0], p[1], fill);
        }
      }
    }

    // Layer 2: Face outline (black)
    svgContent += renderRects(faceRects, '#000', null);

    // Layer 2.5: accessories rendered below hair/glasses/hat
    const earlyAccLabels = [];
    const earlyAccGis = ACC_GROUPS.map((g, i) => earlyAccLabels.includes(g.label) ? i : -1).filter(i => i >= 0);
    for (const egi of earlyAccGis) {
      const accIdx = state.accessory[egi];
      if (accIdx >= 0 && PARTS.accessory[accIdx]) {
        const accPalette = getColorPalette('accessory', egi);
        const accColor = accPalette[state['accColor' + egi]];
        const accPoints = PARTS.accessory[accIdx];
        for (const p of accPoints) {
          const origColor = p[2] || '#000';
          let fill;
          if (origColor === 'blue') { fill = accColor; }
          else if (origColor === '#fff') { fill = '#fff'; }
          else { fill = origColor; }
          svgContent += rect(p[0], p[1], fill);
        }
      }
    }

    // Layer 3: Eyes (black)
    if (PARTS.eyes[eyesIdx]) {
      svgContent += renderRects(PARTS.eyes[eyesIdx], '#000', null);
    }

    // Layer 3.5: Mood accessories (below mouth)
    if (skinAccGi >= 0) {
      const accIdx = state.accessory[skinAccGi];
      if (accIdx >= 0) {
        const accPalette = getColorPalette('accessory', skinAccGi);
        const accColor = accPalette[state['accColor' + skinAccGi]];
        const beardStyleIdx = BEARD_ACC_MAP[accIdx];
        const accPoints = (beardStyleIdx !== undefined && PARTS.beard[beardStyleIdx])
          ? PARTS.beard[beardStyleIdx][state.face] || PARTS.beard[beardStyleIdx][0]
          : PARTS.accessory[accIdx];
        if (accPoints) {
          for (const p of accPoints) {
            const origColor = p[2] || '#000';
            let fill;
            if (origColor === 'blue') { fill = accColor; }
            else if (origColor === '#fff') { fill = '#fff'; }
            else { fill = origColor; }
            svgContent += `<rect x="${p[0]}" y="${p[1]}" width="10" height="10" fill="${fill}" data-mood="1"/>`;
          }
        }
      }
    }

    // Layer 4: Mouth (keep original colors)
    if (PARTS.mouth[mouthIdx]) {
      const mouthPoints = PARTS.mouth[mouthIdx];
      for (const p of mouthPoints) {
        const color = p[2] || '#000';
        svgContent += rect(p[0], p[1], color);
      }
    }

    // Layer 5: Hair + hairOverlay
    if (hairIdx >= 0 && PARTS.hair[hairIdx]) {
      // Hair rects: replace #666 with selected hair color
      const hairPoints = PARTS.hair[hairIdx];
      for (const p of hairPoints) {
        const origColor = p[2] || '#000';
        const fill = origColor === '#666' ? hairColor : origColor;
        svgContent += rect(p[0], p[1], fill);
      }

      // Hair overlay (covers face outline with hair color)
      if (PARTS.hairOverlay[hairIdx]) {
        const overlayPoints = PARTS.hairOverlay[hairIdx];
        for (const p of overlayPoints) {
          const origColor = p[2] || '#000';
          const fill = origColor === '#666' ? hairColor : origColor;
          svgContent += rect(p[0], p[1], fill);
        }
      }
    }

    // Layer 5.5: Earring (above hair, below hat/glasses)
    const earringGi = ACC_GROUPS.findIndex(g => g.label === 'Earring');
    if (earringGi >= 0) {
      const earringIdx = state.accessory[earringGi];
      if (earringIdx >= 0 && PARTS.accessory[earringIdx]) {
        const ePalette = getColorPalette('accessory', earringGi);
        const eColor = ePalette[state['accColor' + earringGi]];
        for (const p of PARTS.accessory[earringIdx]) {
          const origColor = p[2] || '#000';
          let fill;
          if (origColor === 'blue') { fill = eColor; }
          else if (origColor === '#fff') { fill = '#fff'; }
          else { fill = origColor; }
          svgContent += rect(p[0], p[1], fill);
        }
      }
    }

    // Layer 6: Accessories (hat, glasses — skip skin, earring, early-rendered)
    for (let gi = 0; gi < ACC_GROUPS.length; gi++) {
      if (gi === skinAccGi || gi === earringGi || earlyAccGis.includes(gi)) continue;
      const accIdx = state.accessory[gi];
      if (accIdx >= 0 && PARTS.accessory[accIdx]) {
        const accPalette = getColorPalette('accessory', gi);
        const accColor = accPalette[state['accColor' + gi]];
        const accPoints = PARTS.accessory[accIdx];
        for (const p of accPoints) {
          const origColor = p[2] || '#000';
          let fill;
          if (origColor === 'blue') {
            fill = accColor;
          } else if (origColor === '#fff') {
            fill = '#fff';
          } else {
            fill = origColor;
          }
          svgContent += rect(p[0], p[1], fill);
        }
      }
    }

    svg.innerHTML = svgContent;
    updateCardBackground();
  }

  // ── UI: Sidebar ──
  function renderSidebar() {
    const menu = document.getElementById('sidebarMenu');
    menu.innerHTML = CATEGORIES.map(cat => `
      <div class="sidebar-item${activeCategory === cat.id ? ' active' : ''}" data-cat="${cat.id}">
        <span class="cat-icon">${cat.icon}</span>
        <span>${cat.name}</span>
      </div>
    `).join('');

    menu.querySelectorAll('.sidebar-item').forEach(el => {
      el.addEventListener('click', () => {
        activeCategory = el.dataset.cat;
        hideOverlay();
        renderSidebar();
        openSubsidebar(el.dataset.cat);
      });
    });
  }

  // ── UI: Sub-sidebar ──
  function openSubsidebar(catId) {
    const sub = document.getElementById('subsidebar');
    const cat = CATEGORIES.find(c => c.id === catId);
    if (!cat) return;

    document.getElementById('subsidebarTitle').textContent = cat.name;
    sub.classList.add('open');
    renderOptions(cat);
  }

  function getStateKey(catId) {
    // Map category id to state key
    if (catId === 'hair') return 'hair';
    if (catId === 'accessory') return 'accessory';
    return catId;
  }

  function getAccGroupForIdx(accIdx) {
    for (let gi = 0; gi < ACC_GROUPS.length; gi++) {
      if (ACC_GROUPS[gi].indices.includes(accIdx)) return gi;
    }
    return 0;
  }

  function getColorKey(catId, groupIdx) {
    if (catId === 'face') return 'skinColor';
    if (catId === 'hair') return 'hairColor';
    if (catId === 'accessory') {
      const gi = groupIdx !== undefined ? groupIdx : accGroupIdx;
      return 'accColor' + gi;
    }
    if (catId === 'background') return 'bgColor';
    return null;
  }

  function getHueKey(catId, groupIdx) {
    if (catId === 'face') return 'skinHue';
    if (catId === 'hair') return 'hairHue';
    if (catId === 'accessory') {
      const gi = groupIdx !== undefined ? groupIdx : accGroupIdx;
      return 'accHue' + gi;
    }
    if (catId === 'background') return 'bgHue';
    return null;
  }

  function getColorPalette(catId, groupIdx) {
    let base;
    if (catId === 'face') base = SKIN_COLORS;
    else if (catId === 'hair') base = HAIR_COLORS;
    else if (catId === 'accessory') base = ACC_COLORS;
    else if (catId === 'background') base = BG_COLORS;
    else return null;
    // Replace last entry (blue) with dynamic hsl
    const hueKey = getHueKey(catId, groupIdx);
    const hue = state[hueKey];
    const colors = base.slice();
    colors[colors.length - 1] = `hsl(${hue}, 100%, 50%)`;
    return colors;
  }

  function renderOptions(cat) {
    const container = document.getElementById('subsidebarOptions');
    let html = '';

    // Option boxes grid
    const hasNone = (cat.id === 'hair' || cat.id === 'accessory');
    const partsKey = cat.id === 'accessory' ? 'accessory' : cat.id;
    const partsArr = PARTS[partsKey] || [];
    const stateKey = getStateKey(cat.id);
    const currentVal = state[stateKey];

    const noneIconSvg = `<svg viewBox="-20 -20 120 120" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges"><rect x="5" y="5" width="10" height="10" fill="#b3b3b3"/><rect x="15" y="15" width="10" height="10" fill="#b3b3b3"/><rect x="25" y="25" width="10" height="10" fill="#b3b3b3"/><rect x="35" y="35" width="10" height="10" fill="#b3b3b3"/><rect x="45" y="45" width="10" height="10" fill="#b3b3b3"/><rect x="55" y="55" width="10" height="10" fill="#b3b3b3"/><rect x="65" y="65" width="10" height="10" fill="#b3b3b3"/><rect x="65" y="5" width="10" height="10" fill="#b3b3b3"/><rect x="55" y="15" width="10" height="10" fill="#b3b3b3"/><rect x="45" y="25" width="10" height="10" fill="#b3b3b3"/><rect x="25" y="45" width="10" height="10" fill="#b3b3b3"/><rect x="15" y="55" width="10" height="10" fill="#b3b3b3"/><rect x="5" y="65" width="10" height="10" fill="#b3b3b3"/></svg>`;

    // Accessory: tab-based sub-category rendering
    if (cat.id === 'accessory') {
      // Sub-category tabs first, then color palette
      html += '<div class="acc-tabs">';
      ACC_GROUPS.forEach((group, gi) => {
        html += `<button class="acc-tab${gi === accGroupIdx ? ' active' : ''}" data-group="${gi}">${group.label}</button>`;
      });
      html += '</div>';

      // Color palette below tabs
      if (cat.hasColorPalette) {
        html += renderColorPaletteHtml(cat.id);
      }

      // "없음" button + selected group options
      const colors = getColorPalette(cat.id);
      const accColorKey = getColorKey(cat.id);
      const thumbColor = colors ? colors[state[accColorKey]] : ACC_COLORS[state[accColorKey]];
      const activeGroup = ACC_GROUPS[accGroupIdx];
      const groupVal = state.accessory[accGroupIdx];

      html += '<div class="options-grid">';
      html += `<button class="option-box${groupVal === -1 ? ' active' : ''}" data-cat="${cat.id}" data-idx="-1">${noneIconSvg}</button>`;
      for (const idx of activeGroup.indices) {
        const isActive = groupVal === idx;
        const thumbSvg = renderThumbnailSvg(partsKey, idx, thumbColor);
        html += `<button class="option-box${isActive ? ' active' : ''}" data-cat="${cat.id}" data-idx="${idx}">${thumbSvg}</button>`;
      }
      html += '</div>';
    } else if (cat.id === 'background') {
      // Solid color palette
      html += renderColorPaletteHtml('background');

      // Preset colors below
      html += '<div class="options-grid">';
      BG_PRESETS.forEach((grad, i) => {
        const isActive = state.bgType === 'preset' && state.bgGradient === i;
        html += `<button class="option-box${isActive ? ' active' : ''}" data-bg-grad="${i}" style="background:${grad};border-radius:8px;"></button>`;
      });
      html += '</div>';
    } else {
      // Color palette above options for non-accessory categories
      if (cat.hasColorPalette) {
        html += renderColorPaletteHtml(cat.id);
      }
      // Default rendering for other categories
      html += '<div class="options-grid">';

      // "없음" option for hair
      if (hasNone) {
        html += `<button class="option-box${currentVal === -1 ? ' active' : ''}" data-cat="${cat.id}" data-idx="-1">${noneIconSvg}</button>`;
      }

      // Render each variant option
      for (let i = 0; i < partsArr.length; i++) {
        const isActive = currentVal === i;
        const colors = getColorPalette(cat.id);
        const colorKey = getColorKey(cat.id);
        let thumbColor = null;
        if (cat.id === 'hair') thumbColor = colors ? colors[state.hairColor] : HAIR_COLORS[state.hairColor];
        else if (cat.id === 'face') thumbColor = colors ? colors[state.skinColor] : SKIN_COLORS[state.skinColor];
        const thumbSvg = renderThumbnailSvg(partsKey, i, thumbColor);
        html += `<button class="option-box${isActive ? ' active' : ''}" data-cat="${cat.id}" data-idx="${i}">${thumbSvg}</button>`;
      }

      html += '</div>';
    }

    container.innerHTML = html;

    // Bind option click events
    container.querySelectorAll('.option-box').forEach(btn => {
      btn.addEventListener('click', () => {
        // Gradient option click
        if (btn.dataset.bgGrad !== undefined) {
          state.bgType = 'preset';
          state.bgGradient = parseInt(btn.dataset.bgGrad);
          renderOptions(cat);
          updateCardBackground();
          return;
        }
        const idx = parseInt(btn.dataset.idx);
        if (cat.id === 'accessory') {
          state.accessory[accGroupIdx] = idx;
        } else {
          state[stateKey] = idx;
        }
        renderOptions(cat);
        renderAvatar();
      });
    });

    // Bind accessory tab events
    container.querySelectorAll('.acc-tab[data-group]').forEach(tab => {
      tab.addEventListener('click', () => {
        accGroupIdx = parseInt(tab.dataset.group);
        renderOptions(cat);
      });
    });

    // Bind background tab events
    container.querySelectorAll('.acc-tab[data-bgtab]').forEach(tab => {
      tab.addEventListener('click', () => {
        bgTabIdx = parseInt(tab.dataset.bgtab);
        renderOptions(cat);
      });
    });

    // Bind color palette events
    if (cat.id === 'background') {
      bindColorPaletteEvents(container, cat);
    } else if (cat.hasColorPalette) {
      bindColorPaletteEvents(container, cat);
    }
  }

  function renderColorPaletteHtml(catId) {
    const colors = getColorPalette(catId);
    const colorKey = getColorKey(catId);
    const hueKey = getHueKey(catId);
    const currentColorIdx = state[colorKey];
    const lastIdx = colors.length - 1;

    let html = '<div class="color-palette">';
    colors.forEach((color, i) => {
      const bg = i === lastIdx
        ? 'background: conic-gradient(hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%), hsl(180,100%,50%), hsl(240,100%,50%), hsl(300,100%,50%), hsl(360,100%,50%))'
        : `background: ${color}`;
      html += `<div class="color-swatch${currentColorIdx === i ? ' active' : ''}" style="${bg}" data-color-idx="${i}" data-cat="${catId}"></div>`;
    });
    html += '</div>';

    // Show HUE slider when last (custom color) swatch is selected
    if (currentColorIdx === lastIdx) {
      html += `<div class="hue-slider-wrap"><input type="range" class="hue-slider" min="0" max="360" step="1" value="${state[hueKey]}" data-cat="${catId}"></div>`;
    }

    return html;
  }

  function bindColorPaletteEvents(container, cat) {
    const colorKey = getColorKey(cat.id);
    container.querySelectorAll('.color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        state[colorKey] = parseInt(swatch.dataset.colorIdx);
        if (cat.id === 'background') state.bgType = 'solid';
        renderOptions(cat);
        if (cat.id === 'background') updateCardBackground();
        else renderAvatar();
      });
    });

    // HUE slider
    const slider = container.querySelector('.hue-slider');
    if (slider) {
      slider.addEventListener('input', () => {
        const hueKey = getHueKey(cat.id);
        state[hueKey] = parseInt(slider.value);
        const hslColor = `hsl(${state[hueKey]}, 100%, 50%)`;
        // Update last swatch color live
        const swatches = container.querySelectorAll('.color-swatch');
        const lastSwatch = swatches[swatches.length - 1];
        if (lastSwatch) lastSwatch.style.background = hslColor;
        // Update thumbnail fills live
        container.querySelectorAll('.option-box svg rect').forEach(r => {
          const fill = r.getAttribute('fill');
          if (fill && fill.startsWith('hsl(')) {
            r.setAttribute('fill', hslColor);
          }
        });
        if (cat.id === 'background') updateCardBackground();
        else renderAvatar();
      });
    }
  }

  // ── Background ──
  function updateCardBackground() {
    const card = document.getElementById('avatarCard');
    if (state.bgType === 'preset') {
      card.style.background = BG_PRESETS[state.bgGradient] || '#ffffff';
    } else {
      const colors = getColorPalette('background');
      card.style.background = colors[state.bgColor] || '#ffffff';
    }
  }

  function getBgCssValue() {
    if (state.bgType === 'preset') {
      return BG_PRESETS[state.bgGradient] || '#ffffff';
    }
    const colors = getColorPalette('background');
    return colors[state.bgColor] || '#ffffff';
  }

  // ── Home ──
  function resetToHome() {
    state = {
      face: 0, skinColor: 0, eyes: 0, mouth: 0,
      hair: -1, hairColor: 2,
      accessory: [-1,-1,-1,-1],
      accColor0: 2, accColor1: 2, accColor2: 2, accColor3: 2,
      skinHue: 240, hairHue: 240,
      accHue0: 240, accHue1: 240, accHue2: 240, accHue3: 240,
      bgType: 'solid', bgColor: 0, bgGradient: 0, bgHue: 240, bgTexture: false,
    };
    activeCategory = null;
    overlayVisible = true;
    document.getElementById('overlayButtons').classList.remove('hidden');
    document.getElementById('subsidebar').classList.remove('open');
    history = [];
    historyIndex = -1;
    renderAvatar();
    renderSidebar();
    updateUndoRedo();
  }

  // ── Overlay ──
  function hideOverlay() {
    overlayVisible = false;
    document.getElementById('overlayButtons').classList.add('hidden');
  }

  // ── Random ──
  function resolveColor(palette, idx, hue) {
    if (idx === palette.length - 1) return 'hsl(' + hue + ',100%,50%)';
    return palette[idx];
  }

  function pickDistinctColor(palette, hueKey, usedColors) {
    // Try up to 20 times to find a non-overlapping color
    for (let attempt = 0; attempt < 20; attempt++) {
      // 50% chance of picking hue (last index) vs grayscale
      const useHue = Math.random() < 0.5;
      const idx = useHue ? palette.length - 1 : Math.floor(Math.random() * (palette.length - 1));
      let hue = state[hueKey];
      if (idx === palette.length - 1) hue = Math.floor(Math.random() * 360);
      const resolved = resolveColor(palette, idx, hue);
      // For hue colors, check distance from other hue colors
      let conflict = false;
      for (const used of usedColors) {
        if (resolved === used) { conflict = true; break; }
        // Both are hue colors — check if hues are too close
        if (resolved.startsWith('hsl(') && used.startsWith('hsl(')) {
          const h1 = parseInt(resolved.split('(')[1]);
          const h2 = parseInt(used.split('(')[1]);
          const diff = Math.min(Math.abs(h1 - h2), 360 - Math.abs(h1 - h2));
          if (diff < 30) { conflict = true; break; }
        }
      }
      if (!conflict) {
        if (idx === palette.length - 1) state[hueKey] = hue;
        return idx;
      }
    }
    // Fallback: just pick random
    const idx = Math.floor(Math.random() * palette.length);
    if (idx === palette.length - 1) state[hueKey] = Math.floor(Math.random() * 360);
    return idx;
  }

  function randomizeAll() {
    state.face = Math.floor(Math.random() * PARTS.face.length);
    state.eyes = Math.floor(Math.random() * PARTS.eyes.length);
    state.mouth = Math.floor(Math.random() * PARTS.mouth.length);

    // Hair: -1 (none) or 0..n
    if (PARTS.hair.length > 0) {
      state.hair = Math.floor(Math.random() * (PARTS.hair.length + 1)) - 1;
    } else {
      state.hair = -1;
    }

    // Accessory: pick count first, then choose which groups
    const accCountWeights = [0.075, 0.38, 0.30, 0.225, 0.02]; // 0~4개
    const roll = Math.random();
    let accCount = 0, cumul = 0;
    for (let i = 0; i < accCountWeights.length; i++) {
      cumul += accCountWeights[i];
      if (roll < cumul) { accCount = i; break; }
    }
    // Reset all to none
    for (let gi = 0; gi < ACC_GROUPS.length; gi++) state.accessory[gi] = -1;
    // Shuffle group indices and pick accCount groups
    const gis = ACC_GROUPS.map((_, i) => i).sort(() => Math.random() - 0.5);
    for (let i = 0; i < Math.min(accCount, gis.length); i++) {
      const gi = gis[i];
      const group = ACC_GROUPS[gi];
      state.accessory[gi] = group.indices[Math.floor(Math.random() * group.indices.length)];
    }

    // Pick distinct colors for skin, hair, accessory
    const usedColors = [];

    // Skin color first
    state.skinColor = pickDistinctColor(SKIN_COLORS, 'skinHue', usedColors);
    usedColors.push(resolveColor(SKIN_COLORS, state.skinColor, state.skinHue));

    // Hair color (only matters if hair is visible)
    if (state.hair >= 0) {
      state.hairColor = pickDistinctColor(HAIR_COLORS, 'hairHue', usedColors);
      usedColors.push(resolveColor(HAIR_COLORS, state.hairColor, state.hairHue));
    }

    // Accessory colors per group
    for (let gi = 0; gi < ACC_GROUPS.length; gi++) {
      if (state.accessory[gi] >= 0) {
        state['accColor' + gi] = pickDistinctColor(ACC_COLORS, 'accHue' + gi, usedColors);
        usedColors.push(resolveColor(ACC_COLORS, state['accColor' + gi], state['accHue' + gi]));
      }
    }

    // Background: 50% solid, 50% gradient — avoid same color as hair/acc
    if (Math.random() < 0.5) {
      state.bgType = 'solid';
      state.bgColor = pickDistinctColor(BG_COLORS, 'bgHue', usedColors);
      usedColors.push(resolveColor(BG_COLORS, state.bgColor, state.bgHue));
    } else {
      state.bgType = 'preset';
      // Pick preset color that doesn't match hair/acc
      const presetIndices = BG_PRESETS.map((_, i) => i).sort(() => Math.random() - 0.5);
      let picked = 0;
      for (const pi of presetIndices) {
        if (!usedColors.includes(BG_PRESETS[pi])) { picked = pi; break; }
      }
      state.bgGradient = picked;
    }

    renderAvatar();
  }

  function randomizeCategory(catId) {
    pushHistory();

    if (catId === 'face') {
      state.face = Math.floor(Math.random() * PARTS.face.length);
      state.skinColor = Math.floor(Math.random() * SKIN_COLORS.length);
      if (state.skinColor === SKIN_COLORS.length - 1) state.skinHue = Math.floor(Math.random() * 360);
    } else if (catId === 'eyes') {
      state.eyes = Math.floor(Math.random() * PARTS.eyes.length);
    } else if (catId === 'mouth') {
      state.mouth = Math.floor(Math.random() * PARTS.mouth.length);
    } else if (catId === 'hair') {
      if (PARTS.hair.length > 0) {
        state.hair = Math.floor(Math.random() * (PARTS.hair.length + 1)) - 1;
      }
      state.hairColor = Math.floor(Math.random() * HAIR_COLORS.length);
      if (state.hairColor === HAIR_COLORS.length - 1) state.hairHue = Math.floor(Math.random() * 360);
    } else if (catId === 'accessory') {
      // Randomize current group only
      const group = ACC_GROUPS[accGroupIdx];
      if (Math.random() < 0.5) {
        state.accessory[accGroupIdx] = group.indices[Math.floor(Math.random() * group.indices.length)];
      } else {
        state.accessory[accGroupIdx] = -1;
      }
      state['accColor' + accGroupIdx] = Math.floor(Math.random() * ACC_COLORS.length);
      if (state['accColor' + accGroupIdx] === ACC_COLORS.length - 1) state['accHue' + accGroupIdx] = Math.floor(Math.random() * 360);
    } else if (catId === 'background') {
      if (Math.random() < 0.5) {
        state.bgType = 'solid';
        state.bgColor = Math.floor(Math.random() * BG_COLORS.length);
        if (state.bgColor === BG_COLORS.length - 1) state.bgHue = Math.floor(Math.random() * 360);
      } else {
        state.bgType = 'preset';
        state.bgGradient = Math.floor(Math.random() * BG_PRESETS.length);
      }
      updateCardBackground();
    }

    const cat = CATEGORIES.find(c => c.id === catId);
    if (cat) renderOptions(cat);
    renderAvatar();
    updateUndoRedo();
  }

  // ── History (Undo/Redo) ──
  function pushHistory() {
    history = history.slice(0, historyIndex + 1);
    history.push(JSON.parse(JSON.stringify(state)));
    historyIndex = history.length - 1;
  }

  function undo() {
    if (historyIndex <= 0) return;
    historyIndex--;
    state = JSON.parse(JSON.stringify(history[historyIndex]));
    renderAvatar();
    if (activeCategory) {
      const cat = CATEGORIES.find(c => c.id === activeCategory);
      if (cat) renderOptions(cat);
    }
    updateUndoRedo();
  }

  function redo() {
    if (historyIndex >= history.length - 1) return;
    historyIndex++;
    state = JSON.parse(JSON.stringify(history[historyIndex]));
    renderAvatar();
    if (activeCategory) {
      const cat = CATEGORIES.find(c => c.id === activeCategory);
      if (cat) renderOptions(cat);
    }
    updateUndoRedo();
  }

  function updateUndoRedo() {
    const box = document.getElementById('undoRedo');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');

    if (history.length <= 1) {
      box.classList.add('hidden');
      return;
    }
    box.classList.remove('hidden');
    undoBtn.className = historyIndex <= 0 ? 'disabled' : '';
    redoBtn.className = historyIndex >= history.length - 1 ? 'disabled' : '';
  }

  // ── Download ──
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  function openSaveModal() {
    document.getElementById('saveModal').classList.remove('hidden');
    document.getElementById('grainCheckbox').checked = false;
    state.bgTexture = false;
    document.getElementById('saveModalDownload').textContent = isMobile ? 'Share' : 'Download';
    updateSavePreview();
  }

  function closeSaveModal() {
    document.getElementById('saveModal').classList.add('hidden');
  }

  function updateSavePreview() {
    state.bgTexture = document.getElementById('grainCheckbox').checked;
    renderToCanvas(document.getElementById('savePreviewCanvas'), 280);
  }

  function applyGrain(ctx, w, h) {
    // Displacement on alpha-aware pixels only (skip transparent = background)
    const src = ctx.getImageData(0, 0, w, h);
    const s = src.data;
    const dst = ctx.createImageData(w, h);
    const d = dst.data;
    d.set(s);

    for (let y = 1; y < h - 1; y++) {
      for (let x = 1; x < w - 1; x++) {
        const i = (y * w + x) * 4;
        if (s[i+3] === 0) continue; // skip transparent
        if (Math.random() > 0.5) continue; // 50% chance to skip
        const dx = Math.round((Math.random() - 0.5) * 2);
        const dy = Math.round((Math.random() - 0.5) * 2);
        const sx = Math.min(w - 1, Math.max(0, x + dx));
        const sy = Math.min(h - 1, Math.max(0, y + dy));
        const si = (sy * w + sx) * 4;
        d[i] = s[si];
        d[i+1] = s[si+1];
        d[i+2] = s[si+2];
        d[i+3] = s[si+3];
      }
    }
    ctx.putImageData(dst, 0, 0);
  }

  function renderToCanvas(canvas, size) {
    const svgEl = document.getElementById('avatarSvg');
    const clone = svgEl.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

    const rects = clone.querySelectorAll('rect');
    let minX = 240, minY = 240, maxX = 0, maxY = 0;
    rects.forEach(r => {
      if (r.getAttribute('data-mood')) return;
      const rx = parseFloat(r.getAttribute('x'));
      const ry = parseFloat(r.getAttribute('y'));
      const rw = parseFloat(r.getAttribute('width')) || 10;
      const rh = parseFloat(r.getAttribute('height')) || 10;
      if (rx < minX) minX = rx;
      if (ry < minY) minY = ry;
      if (rx + rw > maxX) maxX = rx + rw;
      if (ry + rh > maxY) maxY = ry + rh;
    });
    const contentW = maxX - minX;
    const contentH = maxY - minY;
    const contentCx = minX + contentW / 2;
    const contentCy = minY + contentH / 2;
    const dim = Math.max(Math.max(contentW, contentH) + 80, 280);
    const vbX = contentCx - dim / 2;
    const vbY = contentCy - dim / 2;
    clone.setAttribute('viewBox', `${vbX} ${vbY} ${dim} ${dim}`);
    clone.setAttribute('width', `${dim}`);
    clone.setAttribute('height', `${dim}`);

    const svgData = new XMLSerializer().serializeToString(clone);
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    if (state.bgType === 'preset') {
      ctx.fillStyle = BG_PRESETS[state.bgGradient] || '#f5f5f5';
    } else {
      const bgColors = getColorPalette('background');
      ctx.fillStyle = bgColors[state.bgColor] || '#f5f5f5';
    }
    ctx.fillRect(0, 0, size, size);

    const img = new Image();
    const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      if (state.bgTexture) {
        // Draw avatar on transparent temp canvas, apply grain, then composite
        const tmp = document.createElement('canvas');
        tmp.width = size; tmp.height = size;
        const tctx = tmp.getContext('2d');
        tctx.imageSmoothingEnabled = false;
        const s = size * 0.93;
        const x = (size - s) / 2;
        const y = (size - s) / 2;
        tctx.drawImage(img, x, y, s, s);
        applyGrain(tctx, size, size);
        ctx.drawImage(tmp, 0, 0);
      } else {
        ctx.imageSmoothingEnabled = false;
        const s = size * 0.93;
        const x = (size - s) / 2;
        const y = (size - s) / 2;
        ctx.drawImage(img, x, y, s, s);
      }
      URL.revokeObjectURL(url);
    };
    img.src = url;
  }

  function downloadAvatar() {
    const svgEl = document.getElementById('avatarSvg');
    const clone = svgEl.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

    // Calculate bounding box of all rects to center content
    const rects = clone.querySelectorAll('rect');
    let minX = 240, minY = 240, maxX = 0, maxY = 0;
    rects.forEach(r => {
      if (r.getAttribute('data-mood')) return;
      const rx = parseFloat(r.getAttribute('x'));
      const ry = parseFloat(r.getAttribute('y'));
      const rw = parseFloat(r.getAttribute('width')) || 10;
      const rh = parseFloat(r.getAttribute('height')) || 10;
      if (rx < minX) minX = rx;
      if (ry < minY) minY = ry;
      if (rx + rw > maxX) maxX = rx + rw;
      if (ry + rh > maxY) maxY = ry + rh;
    });

    const contentW = maxX - minX;
    const contentH = maxY - minY;
    const contentCx = minX + contentW / 2;
    const contentCy = minY + contentH / 2;

    // Center viewBox around content center, using the larger dimension
    const dim = Math.max(contentW, contentH) + 80; // 40px padding each side
    const vbX = contentCx - dim / 2;
    const vbY = contentCy - dim / 2;
    clone.setAttribute('viewBox', `${vbX} ${vbY} ${dim} ${dim}`);
    clone.setAttribute('width', `${dim}`);
    clone.setAttribute('height', `${dim}`);

    const svgData = new XMLSerializer().serializeToString(clone);
    const canvas = document.createElement('canvas');
    canvas.width = 560;
    canvas.height = 560;
    const ctx = canvas.getContext('2d');

    // Draw background
    if (state.bgType === 'preset') {
      ctx.fillStyle = BG_PRESETS[state.bgGradient] || '#f5f5f5';
    } else {
      const bgColors = getColorPalette('background');
      ctx.fillStyle = bgColors[state.bgColor] || '#f5f5f5';
    }
    ctx.fillRect(0, 0, 560, 560);

    const img = new Image();
    const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);

    img.onload = () => {
      const size = 520;
      const x = (560 - size) / 2;
      const y = (560 - size) / 2;

      if (state.bgTexture) {
        const tmp = document.createElement('canvas');
        tmp.width = 560; tmp.height = 560;
        const tctx = tmp.getContext('2d');
        tctx.imageSmoothingEnabled = false;
        tctx.drawImage(img, x, y, size, size);
        applyGrain(tctx, 560, 560);
        ctx.drawImage(tmp, 0, 0);
      } else {
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(img, x, y, size, size);
      }
      URL.revokeObjectURL(url);

      canvas.toBlob(async (blob) => {
        if (isMobile && navigator.share && navigator.canShare) {
          const file = new File([blob], 'me.png', { type: 'image/png' });
          try {
            await navigator.share({ files: [file] });
          } catch (e) {
            if (e.name !== 'AbortError') {
              const link = document.createElement('a');
              link.download = 'me.png';
              link.href = URL.createObjectURL(blob);
              link.click();
              URL.revokeObjectURL(link.href);
            }
          }
        } else {
          const link = document.createElement('a');
          link.download = 'me.png';
          link.href = URL.createObjectURL(blob);
          link.click();
          URL.revokeObjectURL(link.href);
        }
        closeSaveModal();
      }, 'image/png');
    };
    img.src = url;
  }

  // ── Init ──
  function init() {
    renderAvatar();
    renderSidebar();
    updateUndoRedo();

    // Initial history entry
    pushHistory();

    // Big random button (overlay)
    document.getElementById('bigRandomBtn').addEventListener('click', () => {
      randomizeAll();
    });

    // Create button (overlay)
    document.getElementById('createBtn').addEventListener('click', () => {
      state = {
        face: 0,
        skinColor: 0,
        eyes: 0,
        mouth: 0,
        hair: -1,
        hairColor: 0,
        accessory: [-1,-1,-1,-1],
        accColor0: 0, accColor1: 0, accColor2: 0, accColor3: 0,
        skinHue: 240,
        hairHue: 240,
        accHue0: 240, accHue1: 240, accHue2: 240, accHue3: 240,
        bgType: 'solid', bgColor: 0, bgGradient: 0, bgHue: 240, bgTexture: false,
      };
      hideOverlay();
      activeCategory = 'face';
      renderSidebar();
      openSubsidebar('face');
      renderAvatar();
    });

    // Sub-sidebar random
    document.getElementById('subRandomBtn').addEventListener('click', () => {
      if (activeCategory) randomizeCategory(activeCategory);
    });

    // Logo → home
    document.getElementById('sidebarLogo').addEventListener('click', resetToHome);
    document.getElementById('mobileLogo').addEventListener('click', resetToHome);

    // Download
    document.getElementById('downloadBtn').addEventListener('click', openSaveModal);
    document.getElementById('saveModalClose').addEventListener('click', closeSaveModal);
    document.getElementById('saveModal').addEventListener('click', (e) => { if (e.target.id === 'saveModal') closeSaveModal(); });
    document.getElementById('grainCheckbox').addEventListener('change', updateSavePreview);
    document.getElementById('saveModalDownload').addEventListener('click', downloadAvatar);

    // Undo/Redo
    document.getElementById('undoBtn').addEventListener('click', undo);
    document.getElementById('redoBtn').addEventListener('click', redo);

    // Prevent drag on undo/redo buttons
    document.getElementById('undoRedo').addEventListener('dragstart', e => e.preventDefault());
  }

  init();
})();
</script>
