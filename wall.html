<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixie Lounge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&family=Pixelify+Sans:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; -webkit-user-drag: none; }
html, body {
  margin: 0; padding: 0;
}
body {
  background: #ffffff url('assets/wall-bg-gradient.png') center/cover no-repeat fixed;
  color: #e8e8e8;
  font-family: 'Outfit', sans-serif;
  height: 100vh;
  overflow: hidden;
  position: fixed;
  width: 100%;
}
.wall-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  background: transparent;
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.wall-header a {
  color: #111; text-decoration: none; font-size: 14px; opacity: 0.6;
}
.wall-header a:hover { opacity: 1; }
.wall-title { font-size: 18px; font-weight: 500; color: #111; }
.wall-grid {
  position: relative;
  width: 100%;
  min-height: calc(100vh - 60px);
  padding: 40px;
}
.wall-grid.scatter .wall-item {
  position: absolute;
  left: 0; top: 0;
  width: 175px;
  will-change: transform;
}
@media (max-width: 600px) {
  .wall-grid {
    position: relative;
    height: calc(100vh - 60px);
    overflow: hidden;
    padding: 0;
  }
  .wall-grid.scatter .wall-item {
    width: 125px;
  }
}
.wall-item {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  animation: float var(--dur) ease-in-out var(--delay) infinite alternate;
  will-change: transform;
}
.wall-avatar {
  width: 100%; aspect-ratio: 1;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
}
.wall-avatar svg { width: 85%; height: 85%; }
.wall-bubble {
  position: relative;
  width: 100%;
  margin-bottom: var(--bubble-gap, -20px);
}
.wall-bubble svg { width: 100%; display: block; }
.wall-bubble-text {
  position: absolute;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Pixelify Sans', 'Outfit', sans-serif;
  color: #000;
  text-align: center;
  overflow: hidden;
  word-break: break-word;
  line-height: 1.3;
}
.wall-bubble.wide {
  width: 130%;
  margin-left: -15%;
}
.wall-loading {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.wall-loading img {
  width: 48px; height: 48px;
  image-rendering: pixelated;
}
.wall-empty { text-align: center; padding: 80px; opacity: 0.4; }
.wall-item {
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
}
.wall-item.dragging {
  cursor: grabbing;
  z-index: 100;
  will-change: left, top;
}
</style>
</head>

        if (grid[ny][nx] !== 1) queue.push([nx,ny]);
      }
    }
  }
  skinFillCache[faceIdx] = filled;
  return filled;
}

function getColorForWall(catId, st, groupIdx) {
  let base;
  if (catId === 'skin') base = SKIN_COLORS;
  else if (catId === 'hair') base = HAIR_COLORS;
  else if (catId === 'accessory') base = ACC_COLORS;
  else if (catId === 'background') base = BG_COLORS;
  else return null;
  let hueKey;
  if (catId === 'skin') hueKey = 'skinHue';
  else if (catId === 'hair') hueKey = 'hairHue';
  else if (catId === 'accessory') hueKey = 'accHue' + (groupIdx || 0);
  else if (catId === 'background') hueKey = 'bgHue';
  const hue = st[hueKey] != null ? st[hueKey] : 240;
  const colors = base.slice();
  colors[colors.length - 1] = 'hsl(' + hue + ', 100%, 50%)';
  return colors;
}

function buildAvatarSvg(st, overrides) {
  const ov = overrides || {};
  const rect = (x, y, fill) => '<rect x="'+x+'" y="'+y+'" width="10.5" height="10.5" fill="'+fill+'"/>';
  const facePts = PARTS.face[st.face] || PARTS.face[0];
  const skinFill = computeSkinFill(st.face);
  const skinColors = getColorForWall('skin', st);
  const skinColor = skinColors[st.skinColor] || '#fff';
  const hairColors = getColorForWall('hair', st);
  const hairColor = st.hair >= 0 ? (hairColors[st.hairColor] || 'gray') : 'gray';
  let svg = '';
  // Hair back
  if (st.hair >= 0 && PARTS.hairBack && PARTS.hairBack[st.hair]) {
    for (const p of PARTS.hairBack[st.hair]) {
      const c = p[2] || '#666';
      svg += rect(p[0], p[1], c === '#666' ? hairColor : c);
    }
  }
  // Skin fill
  for (const p of skinFill) svg += rect(p[0], p[1], skinColor);
  // Face outline
  for (const p of facePts) svg += rect(p[0], p[1], '#000');
  // Eyes
  const eyesIdx = ov.eyes != null ? ov.eyes : st.eyes;
  if (PARTS.eyes[eyesIdx]) {
    for (const p of PARTS.eyes[eyesIdx]) svg += rect(p[0], p[1], p[2] || '#000');
  }
  // Mood accessories
  const moodIndices = [14,15,16,18,19,20,22];
  for (let gi = 0; gi < (st.accessory || []).length; gi++) {
    const accIdx = st.accessory[gi];
    if (accIdx < 0 || !moodIndices.includes(accIdx)) continue;
    const bsi = BEARD_ACC_MAP[accIdx];
    const pts = (bsi !== undefined && PARTS.beard[bsi])
      ? PARTS.beard[bsi][st.face] || PARTS.beard[bsi][0]
      : PARTS.accessory[accIdx];
    if (!pts) continue;
    const ac = getColorForWall('accessory', st, gi);
    const acColor = ac[st['accColor' + gi]] || 'gray';
    for (const p of pts) {
      const c = p[2] || '#000';
      svg += rect(p[0], p[1], (c === '#666' || c === 'blue') ? acColor : c);
    }
  }
  // Mouth
  const mouthIdx = ov.mouth != null ? ov.mouth : st.mouth;
  if (PARTS.mouth[mouthIdx]) {
    for (const p of PARTS.mouth[mouthIdx]) svg += rect(p[0], p[1], p[2] || '#000');
  }
  // Hair + overlay
  if (st.hair >= 0 && PARTS.hair[st.hair]) {
    const hi = st.hair;
    const hp = (HAIR_FACE_VAR[hi] && HAIR_FACE_VAR[hi][st.face]) ? HAIR_FACE_VAR[hi][st.face] : PARTS.hair[hi];
    for (const p of hp) { const c = p[2] || '#666'; svg += rect(p[0], p[1], c === '#666' ? hairColor : c); }
    const op = (HAIR_OVERLAY_FACE_VAR[hi] && HAIR_OVERLAY_FACE_VAR[hi][st.face]) ? HAIR_OVERLAY_FACE_VAR[hi][st.face] : (PARTS.hairOverlay[hi] || []);
    for (const p of op) { const c = p[2] || '#666'; svg += rect(p[0], p[1], c === '#666' ? hairColor : c); }
  }
  // Layer 5.5: Earring (above hair, below hat/glasses)
  const earringIndices = [10,11,12];
  for (let gi = 0; gi < (st.accessory || []).length; gi++) {
    const accIdx = st.accessory[gi];
    if (accIdx < 0 || !earringIndices.includes(accIdx)) continue;
    const pts = PARTS.accessory[accIdx];
    if (!pts) continue;
    const ac = getColorForWall('accessory', st, gi);
    const acColor = ac[st['accColor' + gi]] || 'gray';
    for (const p of pts) {
      const c = p[2] || '#000';
      svg += rect(p[0], p[1], (c === '#666' || c === 'blue') ? acColor : c);
    }
  }
  // Layer 6: Hat, Glasses (above earring)
  for (let gi = 0; gi < (st.accessory || []).length; gi++) {
    const accIdx = st.accessory[gi];
    if (accIdx < 0 || moodIndices.includes(accIdx) || earringIndices.includes(accIdx)) continue;
    const pts = PARTS.accessory[accIdx];
    if (!pts) continue;
    const ac = getColorForWall('accessory', st, gi);
    const acColor = ac[st['accColor' + gi]] || 'gray';
    for (const p of pts) {
      const c = p[2] || '#000';
      svg += rect(p[0], p[1], (c === '#666' || c === 'blue') ? acColor : c);
    }
  }
  return '<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">' + svg + '</svg>';
}

// Shared canvas for text measurement
const _mc = document.createElement('canvas').getContext('2d');

function measureTextFit(text, fontSize, maxW, maxH) {
  _mc.font = fontSize + 'px "Pixelify Sans", "Outfit", sans-serif';
  const words = text.replace(/\n/g, ' ').split('');
  const lines = [''];
  for (const ch of words) {
    const test = lines[lines.length - 1] + ch;
    if (_mc.measureText(test).width > maxW) {
      lines.push(ch);
    } else {
      lines[lines.length - 1] += ch;
    }
  }
  // Also respect manual line breaks
  const manualLines = text.split('\n');
  const allLines = [];
  for (const ml of manualLines) {
    _mc.font = fontSize + 'px "Pixelify Sans", "Outfit", sans-serif';
    let cur = '';
    for (const ch of ml) {
      if (_mc.measureText(cur + ch).width * 1.2 > maxW) {
        allLines.push(cur);
        cur = ch;
      } else { cur += ch; }
    }
    allLines.push(cur);
  }
  const lineH = fontSize * 1.3;
  const totalH = allLines.length * lineH;
  return totalH <= maxH;
}

function buildBubbleSvg(text) {
  // Scale inner dimensions to CSS pixels based on rendered item width
  const isMobile = window.innerWidth <= 600;
  const itemW = isMobile ? 125 : 175;

  // Try each bubble size from smallest to largest
  let chosen = BUBBLES[BUBBLES.length - 1];
  let chosenFontSize = FONT_SIZES[FONT_SIZES.length - 1];

  for (const bubble of BUBBLES) {
    const vbW = parseFloat(bubble.vb.split(' ')[2]);
    const vbH = parseFloat(bubble.vb.split(' ')[3]);
    const scale = itemW / vbW;
    const cssW = bubble.iw * scale;
    const cssH = bubble.ih * scale;
    let fitted = false;
    for (const fs of FONT_SIZES) {
      if (fs < bubble.minFs) break;
      if (measureTextFit(text, fs, cssW, cssH)) {
        chosen = bubble;
        chosenFontSize = fs;
        fitted = true;
        break;
      }
    }
    if (fitted) break;
  }

  const svg = '<svg viewBox="'+chosen.vb+'" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">'+chosen.svg+'</svg>';
  const safeText = text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  const wideClass = chosen.name === 'longest' ? ' wide' : '';

  // Calculate text area position as percentages of viewBox
  const vbParts = chosen.vb.split(' ').map(Number);
  const vbW = vbParts[2], vbH = vbParts[3];
  const leftPct = (chosen.ix / vbW * 100).toFixed(1);
  const topPct = (chosen.iy / vbH * 100).toFixed(1);
  const rightPct = ((vbW - chosen.ix - chosen.iw) / vbW * 100).toFixed(1);
  const bottomPct = ((vbH - chosen.iy - chosen.ih) / vbH * 100).toFixed(1);

  return '<div class="wall-bubble'+wideClass+'">'+svg+'<div class="wall-bubble-text" style="font-size:'+chosenFontSize+'px;left:'+leftPct+'%;top:'+topPct+'%;right:'+rightPct+'%;bottom:'+bottomPct+'%">'+safeText+'</div></div>';
}

function renderWallData(data, grid) {
    if (!data || data.length === 0) {
      grid.innerHTML = '<div class="wall-empty">No avatars yet. Be the first to share!</div>';
      return;
    }
    grid.innerHTML = '';
    const isDesktop = window.innerWidth > 600;
    grid.classList.add('scatter');
    const latest = data.slice(-20).reverse();
    const count = latest.length;
    const placedPositions = [];
    for (let idx = 0; idx < count; idx++) {
      const item = latest[idx];
      let st;
      try { st = JSON.parse(item.state); } catch { continue; }
      const svgHtml = buildAvatarSvg(st);
      const el = document.createElement('div');
      el.className = 'wall-item';
      const rot = (Math.random() * 12 - 6).toFixed(1);
      el.dataset.rot = rot;
      const comment = item.comment || '';
      const bubble = comment ? buildBubbleSvg(comment) : '';
      // Calculate avatar top bound for dynamic bubble gap
      let minY = 240;
      const allParts = [PARTS.face[st.face]||[], PARTS.eyes[st.eyes]||[], PARTS.mouth[st.mouth]||[]];
      if (st.hair >= 0 && PARTS.hair[st.hair]) allParts.push(PARTS.hair[st.hair]);
      for (const pts of allParts) { for (const p of pts) { if (p[1] < minY) minY = p[1]; } }
      for (let gi = 0; gi < (st.accessory||[]).length; gi++) {
        const ai = st.accessory[gi];
        if (ai >= 0 && PARTS.accessory[ai]) for (const p of PARTS.accessory[ai]) { if (p[1] < minY) minY = p[1]; }
      }
      // minY=20(모자) → gap=-20, minY=60(기본) → gap=-40, minY=90(얼굴만) → gap=-55
      const gapPx = -Math.round(40 + (minY - 20) * 0.5);
      const isBig = Math.random() < 0.12;
      const avatarStyle = isBig ? ' style="width:200%;margin-left:-50%;margin-top:-30px"' : '';
      el.dataset.state = item.state;
      el.innerHTML = bubble + '<div class="wall-avatar"'+avatarStyle+'>'+svgHtml+'</div>';
      if (comment) el.querySelector('.wall-bubble').style.setProperty('--bubble-gap', gapPx+'px');
      // Desktop: scatter from center with collision avoidance
      {
        const gridW = window.innerWidth;
        const gridH = window.innerHeight - 10;
        const itemW = isDesktop ? 175 : 125;
        const cx = gridW / 2;
        const cy = gridH / 2;
        const pad = 5;
        const minDist = isBig ? (isDesktop ? 240 : 100) : (isDesktop ? 160 : 80);
        let px, py, attempts = 0;
        do {
          const extraL = isBig ? itemW * 0.5 : 0;
          const extraR = isBig ? itemW * 0.5 : 0;
          const itemH = comment ? (isBig ? itemW * 3 : itemW * 2.2) : (isBig ? itemW * 2 : itemW);
          px = pad + extraL + Math.random() * Math.max(10, gridW - itemW - extraL - extraR - pad * 2);
          py = pad + Math.random() * Math.max(10, gridH - itemH - pad * 2);
          let collides = false;
          for (const placed of placedPositions) {
            const dx = px - placed[0], dy = py - placed[1];
            if (Math.sqrt(dx*dx + dy*dy) < minDist) { collides = true; break; }
          }
          if (!collides) break;
          attempts++;
        } while (attempts < 50);
        placedPositions.push([px, py]);
        const fx = Math.max(pad, Math.min(gridW - itemW - pad, px));
        const fy = Math.max(pad, Math.min(gridH - itemW - pad, py));
        el.style.transform = 'translate('+fx+'px,'+fy+'px) rotate('+rot+'deg)';
        el.dataset.x = fx; el.dataset.y = fy;
        grid.style.height = gridH + 'px';
      }
      grid.appendChild(el);
    }
}

async function loadWall() {
  const grid = document.getElementById('wallGrid');
  // Show cached data instantly
  const cached = localStorage.getItem('wallCache');
  if (cached) {
    try { renderWallData(JSON.parse(cached), grid); } catch {}
    startPhysics();
  }
  // Fetch fresh data in background
  try {
    const res = await fetch(WALL_API);
    const data = await res.json();
    const newJson = JSON.stringify(data);
    if (newJson !== cached) {
      localStorage.setItem('wallCache', newJson);
      physicsStarted = false;
      renderWallData(data, grid);
      startPhysics();
    }
  } catch (err) {
    if (!cached) grid.innerHTML = '<div class="wall-loading">Failed to load. Please try again.</div>';
    console.error(err);
  }
}

let physicsStarted = false;
function startPhysics() {
  if (physicsStarted) return;
  physicsStarted = true;
  (() => {
  const items = document.querySelectorAll('.wall-item');
  if (!items.length) return;
  const pad = 5;
  const bodies = [];

  items.forEach(el => {
    const x = parseFloat(el.dataset.x) || 0;
    const y = parseFloat(el.dataset.y) || 0;
    const speed = 0.3 + Math.random() * 0.4;
    const angle = Math.random() * Math.PI * 2;
    const isBigItem = el.querySelector('.wall-avatar[style*="200%"]') !== null;
    const baseW = el.offsetWidth || 100;
    const baseH = el.offsetHeight || 100;
    // 2x avatar overflows by 50% of baseW on each side
    const extraL = isBigItem ? baseW * 0.5 : 0;
    const extraR = isBigItem ? baseW * 0.5 : 0;
    bodies.push({
      el, x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      w: baseW,
      h: baseH,
      extraL, extraR,
      extraB: 0,
      dragging: false,
      st: JSON.parse(el.dataset.state || '{}'),
      eyesTimer: null,
      mouthTimer: null
    });
  });

  // Re-render avatar SVG with optional overrides
  function rerenderAvatar(b, overrides) {
    const avatarEl = b.el.querySelector('.wall-avatar');
    if (!avatarEl) return;
    const svg = buildAvatarSvg(b.st, overrides);
    avatarEl.innerHTML = svg;
  }

  const MOUTH_BOUNCE = 9;

  // Physics loop
  function tick() {
    const gw = window.innerWidth;
    const gh = window.innerHeight - 10;
    for (const b of bodies) {
      if (b.dragging) continue;
      b.vx *= 0.998; b.vy *= 0.998;
      b.vx += (Math.random() - 0.5) * 0.04;
      b.vy += (Math.random() - 0.5) * 0.04;
      b.x += b.vx; b.y += b.vy;
      const minX = pad + b.extraL;
      const maxX = gw - b.w - b.extraR - pad;
      const maxY = gh - b.h - (b.extraB || 0) - pad;
      let bounced = false;
      const hasComment = b.el.querySelector('.wall-bubble');
      if (b.x < minX) { b.x = minX; b.vx = Math.abs(b.vx); bounced = true; }
      if (b.x > maxX) { b.x = maxX; b.vx = -Math.abs(b.vx); bounced = true; }
      if (b.y < pad) { b.y = pad; b.vy = Math.abs(b.vy); if (!hasComment) bounced = true; }
      if (b.y > maxY) { b.y = maxY; b.vy = -Math.abs(b.vy); bounced = true; }
      if (bounced && b.wasDragged && !b.mouthTimer) {
        rerenderAvatar(b, { mouth: MOUTH_BOUNCE });
        b.mouthTimer = setTimeout(() => { rerenderAvatar(b, {}); b.mouthTimer = null; }, 1200);
        b.wasDragged = false;
      }
      b.el.style.transform = 'translate('+b.x+'px,'+b.y+'px) rotate('+(b.el.dataset.rot||0)+'deg)';
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // Drag interaction
  let dragBody = null, dragOffX = 0, dragOffY = 0;
  let lastX = 0, lastY = 0, lastTime = 0;

  function onStart(e) {
    const t = e.touches ? e.touches[0] : e;
    const target = t.target.closest('.wall-item');
    if (!target) return;
    dragBody = bodies.find(b => b.el === target);
    if (!dragBody) return;
    dragBody.dragging = true;
    dragBody.el.classList.add('dragging');
    cachedGR = document.getElementById('wallGrid').getBoundingClientRect();
    const rect = dragBody.el.getBoundingClientRect();
    dragOffX = t.clientX - rect.left;
    dragOffY = t.clientY - rect.top;
    lastX = t.clientX; lastY = t.clientY; lastTime = Date.now();
    e.preventDefault();
  }

  let dragRAF = null;
  let cachedGR = null;
  function onMove(e) {
    if (!dragBody) return;
    const t = e.touches ? e.touches[0] : e;
    if (!cachedGR) cachedGR = document.getElementById('wallGrid').getBoundingClientRect();
    const gr = cachedGR;
    const gw = window.innerWidth;
    const gh = window.innerHeight - 10;
    let nx = t.clientX - gr.left - dragOffX;
    let ny = t.clientY - gr.top - dragOffY;
    const minX = pad + dragBody.extraL;
    const maxX = gw - dragBody.w - dragBody.extraR - pad;
    const maxY = gh - dragBody.h - (dragBody.extraB || 0) - pad;
    dragBody.x = Math.max(minX, Math.min(maxX, nx));
    dragBody.y = Math.max(pad, Math.min(maxY, ny));
    dragBody.el.style.transform = 'translate('+dragBody.x+'px,'+dragBody.y+'px) rotate('+(dragBody.el.dataset.rot||0)+'deg)';
    const now = Date.now();
    const dt = Math.max(1, now - lastTime);
    dragBody.vx = (t.clientX - lastX) / dt * 8;
    dragBody.vy = (t.clientY - lastY) / dt * 8;
    lastX = t.clientX; lastY = t.clientY; lastTime = now;
    e.preventDefault();
  }

  function onEnd() {
    if (!dragBody) return;
    dragBody.dragging = false;
    dragBody.el.classList.remove('dragging');
    cachedGR = null;
    // Clamp throw speed
    const maxV = 5;
    dragBody.vx = Math.max(-maxV, Math.min(maxV, dragBody.vx));
    dragBody.vy = Math.max(-maxV, Math.min(maxV, dragBody.vy));
    dragBody.wasDragged = true;
    dragBody = null;
  }

  const grid = document.getElementById('wallGrid');
  grid.addEventListener('mousedown', onStart);
  grid.addEventListener('mousemove', onMove);
  grid.addEventListener('mouseup', onEnd);
  grid.addEventListener('mouseleave', onEnd);
  grid.addEventListener('touchstart', onStart, {passive: false});
  grid.addEventListener('touchmove', onMove, {passive: false});
  grid.addEventListener('touchend', onEnd);
  })();
}
loadWall();
</script>
</body>
</html>
